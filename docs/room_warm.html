<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记忆碎片 · 暖光的门后</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#efe2c6;}
  #c3d{position:fixed;inset:0;display:block;}
  #vig{position:fixed;inset:0;z-index:5;pointer-events:none;
    background:radial-gradient(ellipse 72% 66% at 50% 46%,transparent 44%,rgba(0,0,0,.6) 100%);}
  #grain{position:fixed;inset:-50%;z-index:6;pointer-events:none;opacity:.045;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain .5s steps(2) infinite;}
  @keyframes grain{0%{transform:translate(0,0)}50%{transform:translate(-6%,4%)}100%{transform:translate(4%,-5%)}}
  #hint{position:fixed;left:0;right:0;bottom:30px;z-index:10;text-align:center;font-size:15px;letter-spacing:2px;
    color:#c9b48a;text-shadow:0 2px 10px #000;pointer-events:none;transition:opacity .5s;}
  #cross{position:fixed;left:50%;top:50%;z-index:8;width:5px;height:5px;margin:-2.5px;border-radius:50%;
    background:rgba(240,230,200,.5);box-shadow:0 0 4px rgba(0,0,0,.8);pointer-events:none;opacity:0;transition:opacity .3s;}
  #prompt{position:fixed;left:50%;top:56%;z-index:9;transform:translateX(-50%);padding:8px 18px;
    border:1px solid rgba(220,190,130,.5);border-radius:24px;background:rgba(24,17,10,.82);font-size:15px;
    letter-spacing:2px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 24px rgba(240,190,90,.16);
    opacity:0;pointer-events:none;transition:opacity .2s;}
  #prompt.show{opacity:1;}
  /* 记忆闪回 */
  #flash{position:fixed;inset:0;z-index:20;background:radial-gradient(ellipse at 50% 40%,#3a2c18,#0a0806 75%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;text-align:center;padding:0 26px;
    opacity:0;pointer-events:none;transition:opacity 1.2s;}
  #flash.show{opacity:1;pointer-events:auto;}
  #flash .fk{font-size:14px;letter-spacing:6px;color:#b8975a;}
  #flash .ft{max-width:600px;font-size:19px;line-height:2.2;letter-spacing:2px;color:#e7d6b0;
    white-space:pre-line;min-height:9em;text-shadow:0 2px 10px #000;}
  #flash .fb{opacity:0;transition:opacity 1s;}
  #flash .fb.show{opacity:1;}
  .btn{padding:11px 30px;border:1px solid rgba(220,185,120,.5);border-radius:4px;background:rgba(40,30,16,.6);
    color:#f0dcab;font-size:15px;letter-spacing:3px;cursor:pointer;}
  .btn:hover{background:rgba(70,52,26,.7);}
  #gate{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;background:#070503;text-align:center;transition:opacity .8s;}
  #gate.gone{opacity:0;pointer-events:none;}
  #gate .s{font-size:13px;letter-spacing:3px;color:#8a7a54;}
  #gate .go{margin-top:4px;padding:12px 34px;border:1px solid rgba(220,185,120,.55);border-radius:4px;
    background:rgba(40,30,16,.5);color:#f0dcab;font-size:15px;letter-spacing:4px;cursor:pointer;}
  #pad{position:fixed;left:26px;bottom:32px;z-index:11;width:128px;height:128px;border-radius:50%;
    border:1px solid rgba(220,190,140,.22);background:rgba(24,18,10,.32);touch-action:none;display:none;}
  #pad i{position:absolute;left:50%;top:50%;width:50px;height:50px;margin:-25px;border-radius:50%;
    background:rgba(220,185,120,.32);border:1px solid rgba(230,195,130,.5);}
  #eBtn{position:fixed;right:30px;bottom:60px;z-index:11;width:76px;height:76px;border-radius:50%;
    border:1px solid rgba(220,185,120,.4);background:rgba(40,30,16,.5);color:#f0dcab;font-size:20px;
    display:none;align-items:center;justify-content:center;touch-action:none;}
  @media (pointer:coarse){#pad{display:block;}#eBtn{display:flex;}}
  #tag{position:fixed;left:14px;top:12px;z-index:10;font-size:12px;letter-spacing:1px;color:#6b5f45;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<div id="vig"></div><div id="grain"></div>
<div id="cross"></div>
<div id="tag">暖光的门后 · 第一人称</div>
<div id="hint">点击画面进入 · WASD 走动 · 鼠标转头 · 走近发光的东西按 E</div>
<div id="prompt"></div>
<div id="flash">
  <div class="fk">记 忆 碎 片</div>
  <p class="ft" id="flashText"></p>
  <button class="btn fb" id="flashBack">收 起 这 段 记 忆</button>
</div>
<div id="pad"><i></i></div>
<div id="eBtn">E</div>
<div id="gate">
  <div class="s">暖 光 的 门 后</div>
  <button class="go" id="goBtn" disabled>推 门 …</button>
  <div class="s" id="gateHint">正在载入</div>
</div>

<script type="importmap">
{ "imports": { "three": "./assets/lib/three.module.js", "three/addons/": "./assets/lib/" }}
</script>
<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

const $ = s => document.querySelector(s);
const canvas = $("#c3d");
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.25;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0805);
scene.fog = new THREE.FogExp2(0x1a1108, 0.04);
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.05, 80);
camera.position.set(0, 1.6, 2.4);

// 房间尺寸
const RX = 3, RY = 3.4, RZ = 3;
const maxAniso = renderer.capabilities.getMaxAnisotropy();
const manager = new THREE.LoadingManager();
const texL = new THREE.TextureLoader(manager);
function pbr(name, repX, repY, tint) {
  const load = (suffix, srgb) => { const t = texL.load(`./assets/textures/${name}_${suffix}.jpg`);
    t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(repX, repY); t.anisotropy = maxAniso;
    if (srgb) t.colorSpace = THREE.SRGBColorSpace; return t; };
  return new THREE.MeshStandardMaterial({ map:load("color",true), normalMap:load("normal",false),
    roughnessMap:load("rough",false), roughness:1, metalness:0, color:tint });
}
const wallMat  = pbr("wall", 3, 1.4, 0x9a7a52);   // 暖调墙皮
const floorMat = pbr("floor", 3, 3, 0x6b4f33);    // 暖木色地
const ceilMat  = pbr("wall", 3, 1.4, 0x5a442c);
function plane(mat,w,h,pos,rot){ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
  m.position.set(...pos); if(rot)m.rotation.set(...rot); m.receiveShadow=true; scene.add(m); return m; }
plane(floorMat, RX*2, RZ*2, [0,0,0], [-Math.PI/2,0,0]);
plane(ceilMat,  RX*2, RZ*2, [0,RY,0], [Math.PI/2,0,0]);
plane(wallMat, RX*2, RY, [0,RY/2,-RZ], [0,0,0]);
plane(wallMat, RX*2, RY, [0,RY/2, RZ], [0,Math.PI,0]);
plane(wallMat, RZ*2, RY, [-RX,RY/2,0], [0,Math.PI/2,0]);
plane(wallMat, RZ*2, RY, [ RX,RY/2,0], [0,-Math.PI/2,0]);

// 软光晕贴图
const GLOW = (()=>{ const cv=document.createElement("canvas"); cv.width=cv.height=128; const x=cv.getContext("2d");
  const g=x.createRadialGradient(64,64,0,64,64,64); g.addColorStop(0,"rgba(255,255,255,1)");
  g.addColorStop(.45,"rgba(255,255,255,.42)"); g.addColorStop(1,"rgba(255,255,255,0)");
  x.fillStyle=g; x.fillRect(0,0,128,128); return new THREE.CanvasTexture(cv); })();
function glowPlane(color, w, h, op){ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),
  new THREE.MeshBasicMaterial({ map:GLOW, color, transparent:true, opacity:op, blending:THREE.AdditiveBlending, depthWrite:false })); return m; }

// ===== 家具（简单几何，靠暖光营造）=====
const woodDark = new THREE.MeshStandardMaterial({ color:0x4a3320, roughness:.75, metalness:.05 });
const woodLite = new THREE.MeshStandardMaterial({ color:0x6b4a2c, roughness:.7, metalness:.05 });
const cloth    = new THREE.MeshStandardMaterial({ color:0xcaa46a, roughness:.95, metalness:0 });
function box(mat,w,h,d,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m; }
// 小床（靠左墙）
box(woodDark, 1.1, 0.3, 2.0, -RX+0.62, 0.28, -0.6);   // 床架
box(cloth,    1.0, 0.18, 1.9, -RX+0.62, 0.5, -0.6);    // 床垫
box(new THREE.MeshStandardMaterial({color:0xe6d3a6,roughness:1}), 0.9,0.16,0.35, -RX+0.62,0.62,-1.35); // 枕头
box(new THREE.MeshStandardMaterial({color:0xb5813f,roughness:.95}), 1.0,0.05,1.4, -RX+0.62,0.6,-0.2);   // 被子
// 地毯
plane(new THREE.MeshStandardMaterial({color:0x7a4f2c,roughness:1}), 2.2,2.0, [0.4,0.01,0.4], [-Math.PI/2,0,0]);
// 床头柜（放记忆物）
box(woodLite, 0.6,0.7,0.5, 0.7,0.35,-RZ+0.4);
// 窗（暖色外光）
const winPane = new THREE.Mesh(new THREE.PlaneGeometry(1.5,1.3),
  new THREE.MeshBasicMaterial({ color:0xffcf8a })); winPane.position.set(RX-0.03, 1.9, 0.3); winPane.rotation.y=-Math.PI/2; scene.add(winPane);
const winFrame = box(woodDark, 0.12,1.5,1.7, RX-0.06,1.9,0.3);
const winMull1 = box(woodDark, 0.1,0.08,1.7, RX-0.05,1.9,0.3);
const winMull2 = box(woodDark, 0.1,1.5,0.08, RX-0.05,1.9,0.3);
const winGlow = glowPlane(0xffc074, 2.0,1.9, .32); winGlow.position.set(RX-0.12,1.9,0.3); winGlow.rotation.y=-Math.PI/2; scene.add(winGlow);
const winLight = new THREE.PointLight(0xffc074, 1.4, 6, 2); winLight.position.set(RX-0.5,1.9,0.3); scene.add(winLight);

// ===== 记忆物：会发光的音乐盒（在床头柜上）=====
const mbGroup = new THREE.Group(); mbGroup.position.set(0.7, 0.78, -RZ+0.4); scene.add(mbGroup);
const mbBase = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.16,0.24),
  new THREE.MeshStandardMaterial({ color:0x7a4a22, roughness:.5, metalness:.2, emissive:0x2a1400, emissiveIntensity:1 }));
mbBase.castShadow=true; mbGroup.add(mbBase);
const mbLid = new THREE.Mesh(new THREE.BoxGeometry(0.34,0.05,0.26),
  new THREE.MeshStandardMaterial({ color:0x8a5a2a, roughness:.4, metalness:.3 })); mbLid.position.y=0.1; mbLid.rotation.x=-0.5; mbGroup.add(mbLid);
const mbGlow = glowPlane(0xffcf8a, 1.4,1.4, .85); mbGlow.position.set(0,0.1,0.2); mbGroup.add(mbGlow);
const mbLight = new THREE.PointLight(0xffcf8a, 1.6, 3.2, 2); mbLight.position.set(0,0.25,0.1); mbGroup.add(mbLight);
const MB_WORLD = new THREE.Vector3(); mbGroup.getWorldPosition(MB_WORLD);

// ===== 灯光 =====
scene.add(new THREE.AmbientLight(0x3a2c18, 1.6));
const bulb = new THREE.PointLight(0xffca7a, 3.2, 9, 2); bulb.position.set(0,RY-0.5,0.3);
bulb.castShadow=true; bulb.shadow.mapSize.set(1024,1024); scene.add(bulb);
const bulbMesh = new THREE.Mesh(new THREE.SphereGeometry(0.07,10,10), new THREE.MeshBasicMaterial({color:0xffe4b0}));
bulbMesh.position.copy(bulb.position); scene.add(bulbMesh);
box(new THREE.MeshStandardMaterial({color:0x2a1c10,roughness:.7}), 0.02,0.5,0.02, 0,RY-0.25,0.3); // 灯线

// ===== 第一人称控制 =====
let yaw = 0, pitch = 0; const keys = {};
const euler = new THREE.Euler(0,0,0,"YXZ");
function applyLook(){ euler.set(pitch,yaw,0); camera.quaternion.setFromEuler(euler); } applyLook();
addEventListener("keydown", e=>{ const k=e.key.toLowerCase();
  if(["w","a","s","d","arrowup","arrowdown","arrowleft","arrowright"].includes(k)){keys[k]=true;e.preventDefault();}
  if(k==="e"||k==="enter") tryTouch(); });
addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);
const SENS=0.0022;
canvas.addEventListener("click", ()=>{ if(started && !document.pointerLockElement) canvas.requestPointerLock(); });
addEventListener("mousemove", e=>{ if(document.pointerLockElement===canvas){ yaw-=e.movementX*SENS; pitch-=e.movementY*SENS;
  pitch=Math.max(-1.3,Math.min(1.3,pitch)); applyLook(); } });
let padActive=false, padVec={x:0,y:0}, look={id:null,x:0,y:0};
const pad=$("#pad"), stick=pad.querySelector("i");
pad.addEventListener("pointerdown", e=>{padActive=true;padMove(e);pad.setPointerCapture(e.pointerId);});
pad.addEventListener("pointermove", e=>{if(padActive)padMove(e);});
pad.addEventListener("pointerup", ()=>{padActive=false;padVec={x:0,y:0};stick.style.transform="translate(0,0)";});
function padMove(e){ const r=pad.getBoundingClientRect(); let dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2);
  const m=Math.hypot(dx,dy),mx=r.width/2-8; if(m>mx){dx*=mx/m;dy*=mx/m;} padVec={x:dx/mx,y:dy/mx}; stick.style.transform=`translate(${dx}px,${dy}px)`; }
canvas.addEventListener("touchstart", e=>{const t=e.changedTouches[0]; if(t.clientX>innerWidth*0.4)look={id:t.identifier,x:t.clientX,y:t.clientY};},{passive:true});
canvas.addEventListener("touchmove", e=>{for(const t of e.changedTouches){if(t.identifier===look.id){yaw-=(t.clientX-look.x)*0.005;pitch-=(t.clientY-look.y)*0.005;pitch=Math.max(-1.3,Math.min(1.3,pitch));look.x=t.clientX;look.y=t.clientY;applyLook();}}},{passive:true});
canvas.addEventListener("touchend", e=>{for(const t of e.changedTouches)if(t.identifier===look.id)look.id=null;},{passive:true});
$("#eBtn").addEventListener("pointerdown", e=>{e.preventDefault();tryTouch();});

// ===== 记忆物交互 =====
const promptEl=$("#prompt"), flashEl=$("#flash");
let near=false, taken=false, done=false;
const fwd=new THREE.Vector3(), toObj=new THREE.Vector3();
const MEMORY = "妈妈在厨房喊你的名字，喊了两遍。\n饭菜的热气糊住了窗，外面下着雪。\n你跑过去，围裙上是你最爱的那道菜的味道——\n可你想不起她的脸，也想不起，自己的名字。\n\n音乐盒的底座，刻着一行很小的字：\n「样本 7931 · 温暖 · 家 —— 已录入」。\n这段温暖，从来不是你的。\n是他们，放进来的。";
function updatePrompt(){
  if(done||flashEl.classList.contains("show")){ promptEl.classList.remove("show"); return; }
  camera.getWorldDirection(fwd);
  const dist=camera.position.distanceTo(MB_WORLD);
  toObj.copy(MB_WORLD).sub(camera.position).normalize();
  const facing=fwd.dot(toObj);
  near = dist<1.8 && facing>0.6;
  if(near){ promptEl.textContent="按 E 看这只音乐盒"; promptEl.classList.add("show"); }
  else promptEl.classList.remove("show");
}
function tryTouch(){
  if(done || flashEl.classList.contains("show") || !near) return;
  if(document.pointerLockElement) document.exitPointerLock();
  promptEl.classList.remove("show");
  flashEl.classList.add("show");
  // 打字机
  const ft=$("#flashText"); ft.textContent="";
  let i=0; const timer=setInterval(()=>{ i++; ft.textContent=MEMORY.slice(0,i);
    if(i>=MEMORY.length){ clearInterval(timer); setTimeout(()=>$("#flashBack").classList.add("show"),500); } }, 42);
}
$("#flashBack").addEventListener("click", ()=>{
  // 记下这块碎片，回走廊
  try{ const c=JSON.parse(localStorage.getItem("mf3d_cleared")||"[]");
    if(!c.includes("warm")){ c.push("warm"); localStorage.setItem("mf3d_cleared", JSON.stringify(c)); } }catch(e){}
  done=true; location.href="corridor3d.html";
});

// ===== 循环 =====
const clock=new THREE.Clock(); const SPEED=2.2, up=new THREE.Vector3(0,1,0);
const mv=new THREE.Vector3(), right=new THREE.Vector3(); let started=false, t=0;
function frame(){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05, clock.getDelta()); t+=dt;
  if(started && !flashEl.classList.contains("show")){
    camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize(); right.crossVectors(fwd,up).normalize();
    mv.set(0,0,0);
    if(keys["w"]||keys["arrowup"])mv.add(fwd); if(keys["s"]||keys["arrowdown"])mv.sub(fwd);
    if(keys["d"]||keys["arrowright"])mv.add(right); if(keys["a"]||keys["arrowleft"])mv.sub(right);
    if(padActive){ mv.addScaledVector(fwd,-padVec.y); mv.addScaledVector(right,padVec.x); }
    if(mv.lengthSq()>0.0001){ mv.normalize().multiplyScalar(SPEED*dt); camera.position.add(mv);
      camera.position.x=Math.max(-RX+0.35,Math.min(RX-0.35,camera.position.x));
      camera.position.z=Math.max(-RZ+0.35,Math.min(RZ-0.35,camera.position.z)); }
  }
  camera.position.y=1.6;
  // 音乐盒微微呼吸发光
  const pulse=0.8+Math.sin(t*1.6)*0.2; mbLight.intensity=1.4*pulse; mbGlow.material.opacity=0.7*pulse;
  mbBase.material.emissiveIntensity=0.6+0.4*pulse;
  updatePrompt();
  composer.render();
}
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.6,0.6,0.8);
composer.addPass(bloom); composer.addPass(new OutputPass());
function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); bloom.setSize(innerWidth,innerHeight); }
addEventListener("resize", resize); resize(); frame();

manager.onLoad=()=>{ const b=$("#goBtn"); b.disabled=false; b.textContent="推 门 进 去"; $("#gateHint").textContent="点击进入 · 找到那件发光的东西"; };
$("#goBtn").addEventListener("click", ()=>{ if($("#goBtn").disabled)return; started=true;
  $("#gate").classList.add("gone"); $("#cross").style.opacity="1"; if(!("ontouchstart" in window)) canvas.requestPointerLock(); });
setTimeout(()=>{ const b=$("#goBtn"); if(b.disabled){ b.disabled=false; b.textContent="推 门 进 去"; } }, 3500);

window.__room={ scene, camera, renderer, composer, frame, start(){started=true;}, MB_WORLD,
  set yaw(v){yaw=v;applyLook();}, set pitch(v){pitch=v;applyLook();}, trigger:()=>{near=true;tryTouch();} };
</script>
</body>
</html>
