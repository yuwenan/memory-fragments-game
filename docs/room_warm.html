<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记忆碎片 · 暖光的门后</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#e8dcc2;}
  #c3d{position:fixed;inset:0;display:block;}
  #vig{position:fixed;inset:0;z-index:5;pointer-events:none;
    background:radial-gradient(ellipse 74% 68% at 50% 46%,transparent 46%,rgba(0,0,0,.55) 100%);}
  #grain{position:fixed;inset:-50%;z-index:6;pointer-events:none;opacity:.04;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain .5s steps(2) infinite;}
  @keyframes grain{0%{transform:translate(0,0)}50%{transform:translate(-6%,4%)}100%{transform:translate(4%,-5%)}}
  #cross{position:fixed;left:50%;top:50%;z-index:8;width:5px;height:5px;margin:-2.5px;border-radius:50%;
    background:rgba(240,230,200,.5);box-shadow:0 0 4px rgba(0,0,0,.8);pointer-events:none;opacity:0;transition:opacity .3s;}
  #tag{position:fixed;left:14px;top:12px;z-index:10;font-size:12px;letter-spacing:1px;color:#6b5f45;pointer-events:none;}
  #cap{position:fixed;left:0;right:0;top:10%;z-index:10;text-align:center;font-size:15px;letter-spacing:3px;
    color:#e3d4b2;text-shadow:0 0 14px rgba(0,0,0,.9),0 2px 8px #000;opacity:0;transition:opacity .7s;pointer-events:none;}
  #cap.show{opacity:1;}
  #prompt{position:fixed;left:50%;top:56%;z-index:9;transform:translateX(-50%);padding:8px 18px;
    border:1px solid rgba(220,190,130,.5);border-radius:24px;background:rgba(24,17,10,.82);font-size:15px;
    letter-spacing:2px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 24px rgba(240,190,90,.16);
    opacity:0;pointer-events:none;transition:opacity .2s;}
  #prompt.show{opacity:1;}
  #blk{position:fixed;inset:0;z-index:14;background:#000;opacity:0;pointer-events:none;transition:opacity .5s;}
  #blk.show{opacity:1;}
  #fadein{position:fixed;inset:0;z-index:13;background:#000;opacity:0;pointer-events:none;transition:opacity 1.6s;}
  #noise{position:fixed;right:16px;top:14px;z-index:10;width:132px;display:none;pointer-events:none;}
  #noise .nl{font-size:11px;letter-spacing:3px;color:#8a7a54;margin-bottom:4px;text-align:right;}
  #noise .nb{height:5px;border:1px solid rgba(220,185,120,.35);border-radius:3px;background:rgba(20,14,8,.6);overflow:hidden;}
  #noise .nf{height:100%;width:0%;background:linear-gradient(90deg,#8a6b32,#d8a24a);transition:width .25s;}
  #noise.hi .nf{background:linear-gradient(90deg,#a03a22,#e06a3a);}
  #death{position:fixed;inset:0;z-index:32;background:#000;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:0 28px;opacity:0;pointer-events:none;transition:opacity .9s;}
  #death.show{opacity:1;}
  #death .dt{max-width:560px;font-size:20px;line-height:2;letter-spacing:3px;color:#c9a29a;text-shadow:0 2px 12px #000;}
  #flash{position:fixed;inset:0;z-index:30;background:radial-gradient(ellipse at 50% 40%,#3a2c18,#0a0806 75%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;text-align:center;padding:0 26px;
    opacity:0;pointer-events:none;transition:opacity 1.2s;}
  #flash.show{opacity:1;pointer-events:auto;}
  #flash .fk{font-size:14px;letter-spacing:6px;color:#b8975a;}
  #flash .ft{max-width:600px;font-size:19px;line-height:2.2;letter-spacing:2px;color:#e7d6b0;
    white-space:pre-line;min-height:9em;text-shadow:0 2px 10px #000;}
  #flash .fb{opacity:0;transition:opacity 1s;}
  #flash .fb.show{opacity:1;}
  .btn{padding:11px 30px;border:1px solid rgba(220,185,120,.5);border-radius:4px;background:rgba(40,30,16,.6);
    color:#f0dcab;font-size:15px;letter-spacing:3px;cursor:pointer;}
  .btn:hover{background:rgba(70,52,26,.7);}
  #gate{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;background:#070503;text-align:center;transition:opacity .8s;}
  #gate.gone{opacity:0;pointer-events:none;}
  #gate .s{font-size:13px;letter-spacing:3px;color:#8a7a54;}
  #gate .go{margin-top:4px;padding:12px 34px;border:1px solid rgba(220,185,120,.55);border-radius:4px;
    background:rgba(40,30,16,.5);color:#f0dcab;font-size:15px;letter-spacing:4px;cursor:pointer;}
  #pad{position:fixed;left:26px;bottom:32px;z-index:11;width:128px;height:128px;border-radius:50%;
    border:1px solid rgba(220,190,140,.22);background:rgba(24,18,10,.32);touch-action:none;display:none;}
  #pad i{position:absolute;left:50%;top:50%;width:50px;height:50px;margin:-25px;border-radius:50%;
    background:rgba(220,185,120,.32);border:1px solid rgba(230,195,130,.5);}
  #eBtn{position:fixed;right:30px;bottom:60px;z-index:11;width:76px;height:76px;border-radius:50%;
    border:1px solid rgba(220,185,120,.4);background:rgba(40,30,16,.5);color:#f0dcab;font-size:20px;
    display:none;align-items:center;justify-content:center;touch-action:none;}
  @media (pointer:coarse){#pad{display:block;}#eBtn{display:flex;}}
  /* 看清挂画:按E放大查看 */
  #pv{position:fixed;inset:0;z-index:31;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;background:rgba(0,0,0,.88);opacity:0;pointer-events:none;transition:opacity .45s;cursor:pointer;}
  #pv.show{opacity:1;pointer-events:auto;}
  #pv img{max-width:min(62vw,520px);max-height:58vh;border:10px solid #241a10;border-radius:2px;
    box-shadow:0 30px 90px rgba(0,0,0,.95),inset 0 0 30px rgba(0,0,0,.5);background:#111;
    transform:scale(.94);transition:transform .45s;}
  #pv.show img{transform:scale(1);}
  #pv .pt{max-width:560px;text-align:center;font-size:16px;line-height:2;letter-spacing:2px;color:#e3d4b2;
    text-shadow:0 2px 10px #000;padding:0 24px;}
  #pv .ps{font-size:12px;letter-spacing:3px;color:#8a7a54;}
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<div id="vig"></div><div id="grain"></div>
<div id="cross"></div>
<div id="tag">暖光的门后 · 家</div>
<div id="cap"></div>
<div id="prompt"></div>
<div id="blk"></div>
<div id="fadein"></div>
<div id="noise"><div class="nl">动 静</div><div class="nb"><div class="nf" id="noiseFill"></div></div></div>
<div id="death"><p class="dt" id="deathText"></p></div>
<div id="flash">
  <div class="fk">记 忆 碎 片</div>
  <p class="ft" id="flashText"></p>
  <button class="btn fb" id="flashBack">收 起 这 段 记 忆</button>
</div>
<div id="pv"><img id="pvImg" alt=""><div class="pt" id="pvTxt"></div><div class="ps">点 击 任 意 处 放 回</div></div>
<div id="pad"><i></i></div>
<div id="eBtn">E</div>
<div id="gate">
  <div class="s">暖 光 的 门 后</div>
  <button class="go" id="goBtn" disabled>正在回家…</button>
  <div class="s" id="gateHint">好像有人在等你</div>
</div>

<script type="importmap">
{ "imports": { "three": "./assets/lib/three.module.js", "three/addons/": "./assets/lib/" }}
</script>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/GLTFLoader.js";
import { RGBELoader } from "three/addons/RGBELoader.js";
import { Reflector } from "three/addons/objects/Reflector.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

const $ = s => document.querySelector(s);
const QA = new URLSearchParams(location.search);
const canvas = $("#c3d");
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.25));   // 性能:再降渲染像素
renderer.shadowMap.enabled = false;                          // 性能:实时阴影整页关(卡顿大头)
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.85;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040403);
// 环境贴图:全场景材质(木/金属/漆面)有真实反射,去塑料感;夜晚HDRI反射很弱不破恐怖氛围
new RGBELoader().load("./assets/home/night.hdr", t=>{
  t.mapping = THREE.EquirectangularReflectionMapping; scene.environment = t; });
scene.fog = new THREE.FogExp2(0x0d0a07, 0.03);
const camera = new THREE.PerspectiveCamera(68, innerWidth/innerHeight, 0.04, 60);
camera.position.set(1.2, 1.55, 2.2);
const solids = [];

// ===== 材质 =====
const maxAniso = renderer.capabilities.getMaxAnisotropy();
const manager = new THREE.LoadingManager();
const texL = new THREE.TextureLoader(manager);
function pbr(name, repX, repY, tint){
  const load = (suffix, srgb) => { const t = texL.load(`./assets/home/textures/${name}_${suffix}.jpg`);
    t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(repX, repY); t.anisotropy = maxAniso;
    if (srgb) t.colorSpace = THREE.SRGBColorSpace; return t; };
  const m = new THREE.MeshStandardMaterial({ map:load("color",true), normalMap:load("normal",false),
    roughnessMap:load("rough",false), roughness:1, metalness:0, color:tint, side:THREE.DoubleSide });
  m.normalScale.set(0.35,0.35); return m;
}
const wallMat  = pbr("wall", 4.5, 1.6, 0xe0d3b4);      // 再亮一档:家里灯全开的正常亮度
const floorMat = pbr("floor", 4, 4, 0xc4a98a);
const ceilMat  = pbr("wall", 3, 3, 0xa89c88);
// 瓷砖:密铺小砖+柔和米灰(原来2.4大格黑白像测试贴图),不再是大棋盘
const tileMat  = pbr("tile", 6, 5, 0xb8bab0);
const tileFloorMat = pbr("tile", 5, 4, 0x9ea19a);
const woodDark = new THREE.MeshStandardMaterial({ color:0x4a3524, roughness:.62, metalness:.06 });
const trimMat  = new THREE.MeshStandardMaterial({ color:0x8a7a5e, roughness:.6 });

// ===== 户型 =====
// 客厅 x[-3.5,2.0] z[-2.6,2.6] 高2.8 ｜ 厨房 x[2.0,5.4] z[-2.6,1.0]（x=2.0墙开口z[-1.2,0.4]）
// 走道 x[-1.0,0.4] z[-6.2,-2.6] 高2.5 ｜ 卧室门在走道东墙(反锁) ｜ 卫生间 x[-2.4,0.9] z[-8.4,-6.2]
function box(mat,w,h,d,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); scene.add(m); return m; }
function plane(mat,w,h,pos,rot){ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
  m.position.set(...pos); if(rot)m.rotation.set(...rot); scene.add(m); return m; }
// 地板
plane(floorMat, 5.5, 5.2, [-0.75,0,0], [-Math.PI/2,0,0]);                 // 客厅
plane(floorMat, 3.4, 3.6, [3.7,0,-0.8], [-Math.PI/2,0,0]);                // 厨房
plane(floorMat, 1.4, 3.6, [-0.3,0,-4.4], [-Math.PI/2,0,0]);               // 走道
plane(tileFloorMat, 3.3, 2.2, [-0.75,0.001,-7.3], [-Math.PI/2,0,0]);      // 卫生间
// 天花
plane(ceilMat, 5.5, 5.2, [-0.75,2.8,0], [Math.PI/2,0,0]);
plane(ceilMat, 3.4, 3.6, [3.7,2.8,-0.8], [Math.PI/2,0,0]);
plane(ceilMat, 1.4, 3.6, [-0.3,2.5,-4.4], [Math.PI/2,0,0]);
plane(ceilMat, 3.3, 2.2, [-0.75,2.5,-7.3], [Math.PI/2,0,0]);
// 墙
// 客厅南墙:窗户位置真开洞(左/右/窗下/窗楣四段),窗洞x[-2.35,-0.85] y[0.9,2.1]
box(wallMat, 1.15, 2.8, 0.1, -2.925, 1.4, 2.65);
box(wallMat, 2.85, 2.8, 0.1, 0.575, 1.4, 2.65);
box(wallMat, 1.5, 0.9, 0.1, -1.6, 0.45, 2.65);
box(wallMat, 1.5, 0.7, 0.1, -1.6, 2.45, 2.65);
box(wallMat, 0.1, 2.8, 5.2, -3.55, 1.4, 0);              // 客厅西
box(wallMat, 2.5, 2.8, 0.1, -2.25, 1.4, -2.65);          // 客厅北左
box(wallMat, 1.6, 2.8, 0.1, 1.2, 1.4, -2.65);            // 客厅北右
box(wallMat, 1.4, 0.7, 0.1, -0.3, 2.45, -2.65);          // 走道门楣
box(wallMat, 0.1, 2.8, 1.4, 2.0, 1.4, -1.9);             // 客厅/厨房隔墙段1
box(wallMat, 0.1, 2.8, 2.2, 2.0, 1.4, 1.5);              // 段2
box(wallMat, 0.1, 0.7, 1.6, 2.0, 2.45, -0.4);            // 开口门楣
box(wallMat, 3.4, 2.8, 0.1, 3.7, 1.4, 1.05);             // 厨房南
box(wallMat, 0.1, 2.8, 3.7, 5.45, 1.4, -0.8);            // 厨房东
// 厨房北墙:窗户开洞,窗洞x[3.25,4.75] y[0.9,2.1]
box(wallMat, 1.3, 2.8, 0.1, 2.6, 1.4, -2.65);
box(wallMat, 0.7, 2.8, 0.1, 5.1, 1.4, -2.65);
box(wallMat, 1.5, 0.9, 0.1, 4.0, 0.45, -2.65);
box(wallMat, 1.5, 0.7, 0.1, 4.0, 2.45, -2.65);
// 走道
box(wallMat, 0.1, 2.5, 3.6, -1.05, 1.25, -4.4);
box(wallMat, 0.1, 2.5, 3.6, 0.45, 1.25, -4.4);
// 卫生间隔墙(门洞x[-0.75,0.05])
box(tileMat, 1.65, 2.5, 0.1, -1.575, 1.25, -6.25);
box(tileMat, 0.85, 2.5, 0.1, 0.475, 1.25, -6.25);
box(tileMat, 0.8, 0.4, 0.1, -0.35, 2.3, -6.25);
// 卫生间墙
box(tileMat, 0.1, 2.5, 2.2, -2.45, 1.25, -7.3);
box(tileMat, 0.1, 2.5, 2.2, 0.95, 1.25, -7.3);
box(tileMat, 3.5, 2.5, 0.1, -0.75, 1.25, -8.45);
// 踢脚线(真实感)
function skirt(x,z,len,alongX){ const m=new THREE.Mesh(new THREE.BoxGeometry(alongX?len:0.045,0.12,alongX?0.045:len),trimMat);
  m.position.set(x,0.06,z); scene.add(m); }
skirt(-0.75,2.585,5.4,true); skirt(-3.485,0,5.1,false); skirt(-2.25,-2.585,2.4,true); skirt(1.2,-2.585,1.5,true);
skirt(3.7,0.985,3.3,true); skirt(5.385,-0.8,3.6,false); skirt(3.7,-2.585,3.4,true);
skirt(-0.985,-4.4,3.5,false); skirt(0.385,-4.4,3.5,false);

// ===== 入户门(会自己关上;关上后可按E试开=反锁) =====
const doorFrameM = new THREE.MeshStandardMaterial({ color:0x2e2115, roughness:.7 });
const woodPanel = new THREE.MeshStandardMaterial({ color:0x3a2a1a, roughness:.68, metalness:.05 });
const brassM = new THREE.MeshStandardMaterial({ color:0x8a7440, roughness:.3, metalness:.9 });
// 门框:两根门柱+门楣,有厚度凸出墙面(原先是一块薄片)
box(doorFrameM, 0.08, 2.2, 0.14, 0.73, 1.1, 2.60);
box(doorFrameM, 0.08, 2.2, 0.14, 1.67, 1.1, 2.60);
box(doorFrameM, 1.02, 0.1, 0.14, 1.2, 2.15, 2.60);
const entryHinge = new THREE.Group(); entryHinge.position.set(0.77, 0, 2.57); scene.add(entryHinge);
const entryLeaf = new THREE.Mesh(new THREE.BoxGeometry(0.86,2.05,0.05), woodDark);
entryLeaf.position.set(0.43,1.05,0); entryHinge.add(entryLeaf);
// 门板凹陷嵌板(上下两块,正反面都有)
for(const dz of [0.028,-0.028]) for(const [py,ph] of [[1.5,0.75],[0.62,0.62]]){
  const p=new THREE.Mesh(new THREE.BoxGeometry(0.58,ph,0.012), woodPanel);
  p.position.set(0.43,py,dz); entryHinge.add(p);
}
// 黄铜球把手+锁牌(两面)
for(const dz of [0.05,-0.05]){
  const kb = new THREE.Mesh(new THREE.SphereGeometry(0.035,10,8), brassM);
  kb.position.set(0.78,1.02,dz); entryHinge.add(kb);
  const kp = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.16,0.012), brassM);
  kp.position.set(0.75,1.02,dz*0.68); entryHinge.add(kp);
}
entryHinge.rotation.y = -1.25;
const ENTRYDOOR = new THREE.Vector3(1.2, 1.1, 2.55);

// ===== 窗(雨夜,两扇共用雨纹理)+ 窗帘 =====
const rainCv = document.createElement("canvas"); rainCv.width=192; rainCv.height=160;
const rainTex = new THREE.CanvasTexture(rainCv); rainTex.colorSpace = THREE.SRGBColorSpace;
let lightning = 0;
// 远处楼宇的窗灯:位置初始化时定死,别每帧乱跳
const CITY=[]; for(let i=0;i<26;i++) CITY.push({x:Math.random()*192, y:118+Math.random()*34, w:2+Math.random()*2.5, on:Math.random()<0.7});
function drawRainTex(){
  const x = rainCv.getContext("2d"), L = lightning;
  const g = x.createLinearGradient(0,0,0,160);
  g.addColorStop(0, `rgb(${8+L*160|0},${12+L*170|0},${28+L*190|0})`);
  g.addColorStop(1, `rgb(${18+L*150|0},${22+L*160|0},${42+L*180|0})`);
  x.fillStyle=g; x.fillRect(0,0,192,160);
  // 云隙月光
  const mg=x.createRadialGradient(148,26,2,148,26,42);
  mg.addColorStop(0,"rgba(208,218,235,.55)"); mg.addColorStop(1,"rgba(208,218,235,0)");
  x.fillStyle=mg; x.fillRect(96,0,96,74);
  // 远处楼影+零星亮着的窗
  x.fillStyle=`rgba(4,6,10,${0.92-L*0.5})`; x.fillRect(0,112,192,48);
  for(const c of CITY){ if(!c.on) continue;
    x.fillStyle=`rgba(255,214,140,${0.5+L*0.3})`; x.fillRect(c.x,c.y,c.w,2); }
  // 斜雨+玻璃上的挂珠
  x.strokeStyle=`rgba(190,210,235,${0.2+L*0.5})`; x.lineWidth=1;
  for(let i=0;i<34;i++){ const rx=Math.random()*192, ry=Math.random()*160, l=6+Math.random()*12;
    x.beginPath(); x.moveTo(rx,ry); x.lineTo(rx-2,ry+l); x.stroke(); }
  x.fillStyle="rgba(200,220,240,.32)";
  for(let i=0;i<10;i++){ x.beginPath(); x.arc(Math.random()*192,Math.random()*160,0.8,0,7); x.fill(); }
  rainTex.needsUpdate = true;
}
// 有真图就热替换(没有就用上面的程序化夜雨,不走manager不卡载入门)
const plainL = new THREE.TextureLoader();
function hotImg(url, mat){ plainL.load(url, t=>{ t.colorSpace=THREE.SRGBColorSpace;
  mat.map=t; mat.needsUpdate=true; }, undefined, ()=>{}); }
const glassMat = new THREE.MeshBasicMaterial({ map:rainTex, side:THREE.DoubleSide });
hotImg("./assets/home/window_night.jpg", glassMat);
const winFrameM = new THREE.MeshStandardMaterial({ color:0x33291c, roughness:.6 });
const curtainM = new THREE.MeshStandardMaterial({ color:0x5f4636, roughness:.95 });
// 真窗户:墙上开了洞——洞内衬(看得出墙有厚度)+房间面窗框+中梃+玻璃退到墙厚深处+窗台+褶皱窗帘
// 之前是墙面上浮着一张发光贴图+薄黑框,读作一幅画
function windowUnit(x,z,ry){
  const g=new THREE.Group(); g.position.set(x,1.5,z); g.rotation.y=ry; scene.add(g);
  const revealM=new THREE.MeshStandardMaterial({ color:0xcfc4ae, roughness:.7 });
  const rv=(w,h,px,py)=>{ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.13),revealM);
    m.position.set(px,py,-0.045); g.add(m); };

function eastCabinet(zc, zw, yc, h, depth, nDoors, cTop){
  const xWall=5.45, xFront=xWall-depth;
  const ch=cTop||h, cyc=cTop? cTop/2 : yc;
  box(cabM, depth, ch, zw, xWall-depth/2, cyc, zc);                        // 柜体
  const dw=zw/nDoors;

// ===== 声音(全程序化) =====
let AC=null, rainG=null, staticG=null, heartG=null, dripTimer=null, tapG=null;
function au(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function noiseSrc(dur){ const a=au(); if(!a) return null;
  const b=a.createBuffer(1,a.sampleRate*dur,a.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const s=a.createBufferSource(); s.buffer=b; return s; }
function startRain(){ const a=au(); if(!a||rainG) return;
  const s=noiseSrc(2); s.loop=true;
  const f=a.createBiquadFilter(); f.type="bandpass"; f.frequency.value=1500; f.Q.value=0.4;
  rainG=a.createGain(); rainG.gain.value=0.028;
  s.connect(f).connect(rainG).connect(a.destination); s.start(); }
function thud(){ const a=au(); if(!a) return; const s=noiseSrc(0.5);
  const f=a.createBiquadFilter(); f.type="lowpass"; f.frequency.value=90;
  const g=a.createGain(); g.gain.setValueAtTime(1.6,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.45);
  s.connect(f).connect(g).connect(a.destination); s.start(); }
function creak(dur=1.1, f0=180, f1=90){ const a=au(); if(!a) return;
  const o=a.createOscillator(); o.type="sawtooth";
  o.frequency.setValueAtTime(f0,a.currentTime);
  o.frequency.linearRampToValueAtTime(f1,a.currentTime+dur);
  const g=a.createGain(); g.gain.setValueAtTime(0.0001,a.currentTime);
  g.gain.linearRampToValueAtTime(0.05,a.currentTime+0.12);
  g.gain.setValueAtTime(0.045,a.currentTime+dur-0.25);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  const flt=a.createBiquadFilter(); flt.type="lowpass"; flt.frequency.value=800;
  o.connect(flt).connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+dur+0.05); }
function sting(){ const a=au(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain(); o.type="sawtooth";

  g.gain.setValueAtTime(0.22,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.85);

  const s=noiseSrc(0.3); const f=a.createBiquadFilter(); f.type="lowpass"; f.frequency.value=160;
  const g=a.createGain(); g.gain.setValueAtTime(0.7,a.currentTime);

function latch(){ const a=au(); if(!a) return;                    // 锁舌落进锁槽的咔哒
  for(const [d2,fr] of [[0.05,900],[0.11,640]]){
    const o=a.createOscillator(), g=a.createGain(); o.type="square"; o.frequency.value=fr;
    g.gain.setValueAtTime(0.05,a.currentTime+d2); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d2+0.05);
    o.connect(g).connect(a.destination); o.start(a.currentTime+d2); o.stop(a.currentTime+d2+0.06); } }
function rattleSnd(){ const a=au(); if(!a) return;                // 把手咔咔拧不动+门板被顶住的闷响
  for(let i=0;i<3;i++){ const t=a.currentTime+i*0.085;
    const o=a.createOscillator(); o.type="square"; o.frequency.setValueAtTime(210+i*55,t);
    const g=a.createGain(); g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    const f=a.createBiquadFilter(); f.type="bandpass"; f.frequency.value=950; f.Q.value=4;
    o.connect(f).connect(g).connect(a.destination); o.start(t); o.stop(t+0.07); }
  const t=a.currentTime+0.28, o2=a.createOscillator(); o2.type="sine"; o2.frequency.setValueAtTime(78,t);
  const g2=a.createGain(); g2.gain.setValueAtTime(0.09,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o2.connect(g2).connect(a.destination); o2.start(t); o2.stop(t+0.24); }
// 通用砸门:先慢慢挪一点(蓄力)→猛加速砸上→撞上瞬间回调onHit→门板回弹抖两下停住
function slamDoor(hinge, from, to, dur, onHit){
  const t0=performance.now();
  (function an(){ const t=Math.min(1,(performance.now()-t0)/1000/dur);
    let p; if(t<0.25) p=0.08*(t/0.25);
    else { const q=(t-0.25)/0.75; p=0.08+0.92*q*q*q; }
    hinge.rotation.y = from+(to-from)*p;
    if(t<1){ requestAnimationFrame(an); return; }
    onHit && onHit();
    const amp=(to-from)*0.045, s0=performance.now();
    (function settle(){ const s=(performance.now()-s0)/1000;
      hinge.rotation.y = to - amp*Math.sin(s*24)*Math.exp(-s*8);
      if(s<0.6) requestAnimationFrame(settle); else hinge.rotation.y=to; })();
  })();
}
// 砸门冲击:墙上挂画跟着晃几下(阻尼摆)
function swingArts(k){
  for(const g of wallArts){ const t0=performance.now(), ph=Math.random()*3;
    (function an(){ const t=(performance.now()-t0)/1000;
      g.rotation.z = k*Math.sin(t*7+ph)*Math.exp(-t*1.8);
      if(t<2.2) requestAnimationFrame(an); else g.rotation.z=0; })(); }
}

// 只查家具实体(磕碰判定用,墙不算)
function hitSolid(x,z){
  for(const s of solids){
    if(s.rect){ if(x>s.x0-0.05&&x<s.x1+0.05&&z>s.z0-0.05&&z<s.z1+0.05) return true; }
    else if(Math.hypot(x-s.x,z-s.z)<s.r+0.05) return true;
  }
  return false;
}
// 可行走区域
function walkable(x,z){
  const inLR   = x>-3.35 && x<1.85 && z>-2.45 && z<2.45;
  const inKit  = x>1.85 && x<5.25 && z>-2.45 && z<0.85;
  const inHall = x>-0.85 && x<0.25 && z>-6.05 && z<-2.35;   // 上沿盖过客厅边界(原-2.5与-2.45间留了死缝=空气墙)
  const inBath = x>-2.25 && x<0.75 && z>-8.25 && z<-6.0;
  if(!(inLR||inKit||inHall||inBath)) return false;
  if(x>1.82 && x<2.18 && !(z>-1.15 && z<0.35)) return false;                 // 厨房隔墙
  if(z<-6.0 && z>-6.45 && !(bathDoorT>0.5 && x>-0.7 && x<0.0)) return false; // 卫生间门
  for(const s of solids){
    if(s.rect){ if(x>s.x0-0.05&&x<s.x1+0.05&&z>s.z0-0.05&&z<s.z1+0.05) return false; }
    else if(Math.hypot(x-s.x,z-s.z)<s.r+0.05) return false;
  }
  return true;
}

const promptEl=$("#prompt");
const fwd=new THREE.Vector3(), toV=new THREE.Vector3();
function nearFacing(target, maxD, minFace){
  camera.getWorldDirection(fwd);
  const d=camera.position.distanceTo(target); if(d>maxD) return false;
  toV.copy(target).sub(camera.position).normalize();
  return fwd.dot(toV) > (minFace!==undefined?minFace:0.55);
}

function updatePrompt(){
  hot=null;
  if(frozen||$("#flash").classList.contains("show")){ promptEl.classList.remove("show"); return; }
  if(sitting){ hot={id:"stand", tip:"按 E 起身"}; promptEl.textContent=hot.tip; promptEl.classList.add("show"); return; }
  if(nearFacing(SOFA,2.8,0.3)&&!sofaDone) hot={id:"sofa", tip:"按 E 坐一下沙发"};
  else if(nearFacing(SINK,1.4)&&!sinkDone) hot={id:"sink", tip:"按 E 检查水槽"};
  else if(nearFacing(FRIDGE,1.5)&&!fridgeDone) hot={id:"fridge", tip:"按 E 打开冰箱"};

  else if(!bathDoorOpen&&nearFacing(BATHDOOR,1.4)) hot={id:"bath", tip:"按 E 推推这扇门"};
  else if(bedSlammed&&nearFacing(BEDDOOR,1.3)) hot={id:"bed", tip:"按 E 推卧室门"};
  else if(nearFacing(TOILET,1.35)&&!toiletFlushed&&EVT>=3) hot={id:"toilet", tip:"按 E 按下冲水"};
  else if(nearFacing(BOWLS,1.5)&&!bowlsDone) hot={id:"bowls", tip:"按 E 看看碗筷"};

  if(hot.id==="mb"){ addNoise(0.4); openBox(); }
}
const MEMORY = "妈妈在厨房喊你的名字，喊了两遍。\n饭菜的热气糊住了窗，外面下着雪。\n你跑过去，围裙上是你最爱的那道菜的味道——\n可你想不起她的脸，也想不起，自己的名字。\n\n音乐盒的底座，刻着一行很小的字：\n「样本 7931 · 温暖 · 家 —— 已录入」。\n这段温暖，从来不是你的。\n是他们，放进来的。";
let boxOpened=false;
function openBox(){
  if(boxOpened) return; boxOpened=true; frozen=true;
  if(document.pointerLockElement) document.exitPointerLock();
  // 盒盖缓缓翻开+暖光涨起,看清了这个动作再进记忆
  const t0=performance.now();
  (function an(){ const t=Math.min(1,(performance.now()-t0)/900);
    const e2=t*t*(3-2*t); mbLidH.rotation.x=-1.5*e2; mbLight.intensity=1.4+e2*2.4;
    if(t<1) requestAnimationFrame(an); })();
  setTimeout(()=>{
    const fEl=$("#flash"); fEl.classList.add("show");
    const ft=$("#flashText"); ft.textContent="";
    let i=0; const timer=setInterval(()=>{ i++; ft.textContent=MEMORY.slice(0,i);
      if(i>=MEMORY.length){ clearInterval(timer); setTimeout(()=>$("#flashBack").classList.add("show"),500); } }, 42);
  }, 1200);
}
$("#flashBack").addEventListener("click", ()=>{
  try{ const c=JSON.parse(localStorage.getItem("mf3d_cleared")||"[]");
    if(!c.includes("warm")){ c.push("warm"); localStorage.setItem("mf3d_cleared", JSON.stringify(c)); } }catch(e){}
  location.href="corridor3d.html";
});

// 妈妈巡逻:走向最后听到动静的位置(走路不暴露,磕碰/翻动才暴露),走到没人就回房
function momStep(dt){
  if(momState!=="out"||dead) return;
  mom.visible=true;
  mom.lookAt(camera.position.x, mom.position.y, camera.position.z);
  let tx=momTarget.x, tz=momTarget.z;
  const inHall=mom.position.z<-2.7, tgtHall=momTarget.z<-2.7;
  if(inHall!==tgtHall){ tx=-0.3; tz=inHall?-2.2:-3.2; }        // 经走道口,不穿墙
  const ddx=tx-mom.position.x, ddz=tz-mom.position.z, dd=Math.hypot(ddx,ddz);
  const dGoal=Math.hypot(momTarget.x-mom.position.x, momTarget.z-mom.position.z);
  if(dGoal>0.3){
    momPauseT=0;
    const sp=0.85*dt/Math.max(dd,0.0001);
    mom.position.x+=ddx*Math.min(1,sp); mom.position.z+=ddz*Math.min(1,sp);
    slipT-=dt; if(slipT<=0){ slipT=0.55; slipper(); }
  } else {
    momPauseT+=dt;
    if(momPauseT>2.6){ momState="back"; caption("拖鞋声，慢慢远了。", 3200); }
  }
  if(Math.hypot(camera.position.x-mom.position.x, camera.position.z-mom.position.z)<1.0) death();
}
function momBack(dt){
  if(momState!=="back"||dead) return;
  let tx=0.1, tz=-4.9;
  if(mom.position.z>-2.7){ tx=-0.3; tz=-3.2; }
  const dx=tx-mom.position.x, dz=tz-mom.position.z, d=Math.hypot(dx,dz);
  const sp=0.95*dt/Math.max(d,0.0001);
  mom.position.x+=dx*Math.min(1,sp); mom.position.z+=dz*Math.min(1,sp);
  slipT-=dt; if(slipT<=0){ slipT=0.6; slipper(); }
  if(Math.hypot(mom.position.x-0.1, mom.position.z+4.9)<0.3){
    momReset(); noise=0.3; thud(); caption("卧室门，又关上了。", 3000);
  }
  if(Math.hypot(camera.position.x-mom.position.x, camera.position.z-mom.position.z)<0.9) death();
}

// 保底人影演出:不管出没出声,第一次靠近走道口,妈妈的影子在尽头闪过(先让玩家知道"屋里有别人")
let shadowCrossed=false, shadowT=-1;
function shadowCross(dt){
  if(shadowT<0) return;
  shadowT+=dt;
  const k=shadowT/1.1;
  if(k>=1){ mom.visible=false; momMat.opacity=0.97; shadowT=-1;
    caption("走道尽头，有个影子闪过去了。", 3800); return; }
  mom.visible=true; momMat.opacity=0.9*Math.sin(Math.min(1,k)*Math.PI);
  mom.position.set(-0.75+k*1.0, 0.9, -5.7);
  mom.lookAt(camera.position.x, 0.9, camera.position.z);
}

let doorSlammed=false, entryClosed=false, slamFlick=0, faceDone=false, figureGone=false;
function director(dt){
  momStep(dt); momBack(dt); shadowCross(dt);
  if(!shadowCrossed && camera.position.z<-2.2 && momState==="in"){
    shadowCrossed=true; shadowT=0; sting();
  }
  if(started && !doorSlammed){
    doorSlammed=true;
    setTimeout(()=>{ creak(0.6, 200, 120);          // 先吱呀一声再砸上
      slamDoor(entryHinge, -1.25, 0, 0.95, ()=>{ entryClosed=true;
        thud(); latch(); slamFlick=0.55; swingArts(0.05);
        caption("门在你身后关上了。", 3400); });
    }, 11000);
  }
  // 走进走道 → 卧室门自己砰上
  if(!bedSlammed && camera.position.z<-3.3 && camera.position.z>-6.0){
    bedSlammed=true;
    slamDoor(bedHinge, 0.85, 0, 0.7, ()=>{ thud(); latch(); slamFlick=0.4;
      caption("卧室的门，在你面前砰地关上了。", 3800); });
  }
  if(tvOn && !faceDone && nearFacing(TV,1.6,0.35)){
    faceDone=true; faceFlash=0.5; sting();
    setTimeout(()=>{
      tvOn=false; setStatic(false); tvScreen&&(tvScreen.material.color.setHex(0x000000));
      blackout=true; setHeart(true); caption("灯灭了。", 2600);
      setTimeout(()=>{ blackout=false; setHeart(false);
        bathDoorOpen=true; creak(2.2, 150, 70);
        caption("走道深处，有一扇门开了。", 4200); EVT=Math.max(EVT,3);
      }, 2900);
    }, 500);
  }
  if(EVT>=3 && !dripTimer && camera.position.z<-6.2){
    const loop=()=>{ drip(); dripTimer=setTimeout(loop, 1300+Math.random()*1800); }; loop();
  }
  if(EVT>=3 && !mirrorSeen && nearFacing(MIRROR,1.2,0.5) && camera.position.z<-6.4){
    mirrorSeen=true; figureMode="mirror";
    figure.position.set(-0.5,0.925,-6.6);
    setTimeout(()=>{ sting(); caption("镜子里，你身后站着一个人。", 3000); }, 900);
    setTimeout(()=>{
      figureMode="none"; blackout=true; setHeart(true);
      setTimeout(()=>{
        blackout=false; setHeart(false);
        figure.position.set(-0.3,0.925,-6.0);
        figureMode="hall"; figure.visible=true;
        caption("走道的尽头。它在看你。", 4200); EVT=Math.max(EVT,4);
      }, 3200);
    }, 3400);
  }
  if(figureMode==="hall" && !figureGone){
    figMat.opacity = Math.min(0.92, figMat.opacity+dt*0.5);
    figure.position.y = 0.925 + Math.sin(tGlobal*1.1)*0.012;
    figure.lookAt(camera.position.x, figure.position.y, camera.position.z);
    const d=camera.position.distanceTo(figure.position);
    if(d<2.3){
      figureGone=true; figureMode="gone"; figure.visible=false;
      sting(); thud();
      caption("走道尽头没有人。可地板是湿的。", 4200);
      let pi=0; const reveal=()=>{ if(pi<prints.length){ prints[pi++].material.opacity=0.75; setTimeout(reveal,260);}
        else { mbPlaying=true; musicboxLoop();
          mbLight.intensity=1.4; mbBase.material.emissive.setHex(0x2a1400);
          caption("客厅里，音乐盒自己响了。", 4600); EVT=Math.max(EVT,5); } };
      setTimeout(reveal, 900);
    }
  }
}

// ===== 主循环 =====
const clock=new THREE.Clock(); const SPEED=2.1, up=new THREE.Vector3(0,1,0);
const mv=new THREE.Vector3(), right=new THREE.Vector3();
let started=false, frozen=true, tGlobal=0, boltT=8;
function frame(){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05, clock.getDelta()); tGlobal+=dt;
  if(started && !frozen && !$("#flash").classList.contains("show")){
    camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize(); right.crossVectors(fwd,up).normalize();
    mv.set(0,0,0);
    if(!sitting){
    if(keys["w"]||keys["arrowup"])mv.add(fwd); if(keys["s"]||keys["arrowdown"])mv.sub(fwd);
    if(keys["d"]||keys["arrowright"])mv.add(right); if(keys["a"]||keys["arrowleft"])mv.sub(right);
    if(padActive){ mv.addScaledVector(fwd,-padVec.y); mv.addScaledVector(right,padVec.x); }
    }
    playerMoving = mv.lengthSq()>0.0001;
    if(playerMoving){
      mv.normalize().multiplyScalar(SPEED*dt);
      const nx=camera.position.x+mv.x, nz=camera.position.z+mv.z;
      const bx=!walkable(nx,camera.position.z), bz=!walkable(camera.position.x,nz);
      if(!bx) camera.position.x=nx;
      if(!bz) camera.position.z=nz;
      // 磕到家具(撞墙不算)=出声
      if(bumpCd<=0 && ((bx&&hitSolid(nx,camera.position.z))||(bz&&hitSolid(camera.position.x,nz)))){
        bumpCd=1.2; bumpSnd(); addNoise(0.16);
        if(Math.random()<0.45) caption("磕到了。", 1500);
      }
      stepAcc+=Math.hypot(mv.x,mv.z);
      if(stepAcc>0.62){ stepAcc=0; foot(); }
    }
    director(dt);
  }
  // 坐姿:视角平滑降到坐面高度并挪到座位;起身回到站姿(仍留在沙发前)
  if(sitting){
    camera.position.x += (seatX-camera.position.x)*Math.min(1,dt*3);
    camera.position.z += (seatZ-camera.position.z)*Math.min(1,dt*3);
    sitY += (1.05-sitY)*Math.min(1,dt*3);
  } else { sitY += (1.55-sitY)*Math.min(1,dt*4); }
  camera.position.y=sitY;
  mirror.visible = camera.position.z < -5.8;   // 只在卫生间附近渲反射
  const flick = Math.random()<0.03 ? 0.45+Math.random()*0.3 : 1;
  const lateFear = EVT>=4 ? (0.75+0.25*Math.sin(tGlobal*0.7)) : 1;
  const momF = momState==="in" ? 1 : 0.45;   // 妈妈出来时全屋灯压暗
  slamFlick=Math.max(0, slamFlick-dt*1.6);   // 砸门瞬间全屋灯顿一下
  lrLight.intensity = blackout?0 : 5.0*flick*lateFear*(faceDone?0.85:1)*momF*(1-slamFlick*0.7);
  ktLight.intensity = blackout?0 : 4.2*(Math.random()<0.02?0.5:1)*momF*(1-slamFlick*0.7);
  hallLight.intensity = blackout?0 : 2.0*(Math.random()<0.05?0.3:1)*momF*(1-slamFlick*0.7);
  floorLamp.intensity = blackout?0 : 2.2*momF;
  hallBulb.material.color.setHex(blackout?0x111111:0xffe0ae);
  if(EVT>=3 && !blackout){
    const on = Math.random()<0.82;
    bathLight.intensity = on? 1.9 : 0.15;
    tube.material.color.setHex(on?0xd9ecff:0x11151b);
  } else { bathLight.intensity=0; tube.material.color.setHex(0x0e1114); }
  if(tvOn){ drawStatic(); tvScreen&&(tvScreen.material.color.setHex(0xffffff), tvScreen.material.map=staticTex);
    tvLight.intensity=1.1+Math.random()*0.9; }
  else tvLight.intensity=Math.max(0,tvLight.intensity-dt*6);
  if(faceFlash>0){ faceFlash-=dt;
    if(tvScreen){ tvScreen.material.map=faceTex; tvScreen.material.color.setHex(0xffffff); }
    tvLight.intensity=2.2;
    if(faceFlash<=0 && tvScreen){ tvScreen.material.map=staticTex; } }
  if(bathDoorOpen && bathDoorT<1){ bathDoorT=Math.min(1,bathDoorT+dt*0.16);
    const e=bathDoorT*bathDoorT*(3-2*bathDoorT);   // 缓入缓出+末段带一点卡顿的颤,不再匀速
    bathHinge.rotation.y = -(1.9*e + 0.05*Math.sin(bathDoorT*16)*(1-bathDoorT)); }
  // 冰箱门开合(缓动)+冷藏灯闪
  frT += ((frOpen?1:0)-frT)*Math.min(1,dt*4.0);
  frHinge.rotation.y = -1.5 * frT*frT*(3-2*frT);   // 开到1.5rad,别扫到客厅隔墙角
  frLight.intensity = frT>0.1 ? frT*(0.22+(Math.random()<0.15?0:0.3)) : 0;   // 压低,白内腔不过曝
  if((tGlobal*10|0)%2===0) drawRainTex();
  glassMat.color.setScalar(0.7 + lightning*0.5);   // 夜景比屋里暗一档,雷电时整扇窗亮起
  boltT-=dt;
  if(boltT<=0){ boltT=13+Math.random()*20; lightning=1; setTimeout(rumble, 400+Math.random()*800); }
  lightning=Math.max(0,lightning-dt*2.4);
  if(mbPlaying){ const p=0.75+0.25*Math.sin(tGlobal*2.4); mbLight.intensity=1.5*p; }
  // 动静条:妈妈在房里时缓慢消退;她出来时不退
  bumpCd-=dt;
  if(momState==="in") noise=Math.max(0, noise-dt*0.028);
  $("#noiseFill").style.width=(noise*100)+"%";
  $("#noise").classList.toggle("hi", noise>0.7||momState!=="in");
  $("#blk").classList.toggle("show", blackout);
  updatePrompt();
  composer.render();
}
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(256,256),0.38,0.55,0.88);
composer.addPass(bloom); composer.addPass(new OutputPass());
function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); }
addEventListener("resize", resize); resize(); frame();

manager.onLoad=()=>{ const b=$("#goBtn"); b.disabled=false; b.textContent="推 门 回 家";
  $("#gateHint").textContent="点击进入 · 客厅的灯还亮着"; };
setTimeout(()=>{ const b=$("#goBtn"); if(b.disabled){ b.disabled=false; b.textContent="推 门 回 家"; } }, 6000);
// 开场剧情:先给"家的正常",再一点点漏出不对劲
let introDone=false;
function intro(){
  if(introDone) return; introDone=true;
  caption("到家了。玄关的灯，给你留着。", 3400);
  setTimeout(()=>{ clink(); caption("「回来啦？饭在锅里，先去洗手。」——厨房里，妈妈的声音。", 4800); }, 3800);
  setTimeout(()=>{ caption("你应了一声。没有人再答。", 3400); }, 9200);
  setTimeout(()=>{ $("#noise").style.display="block";
    caption("小点动静。别把她引出来。", 3800); }, 14800);
}
$("#goBtn").addEventListener("click", ()=>{ if($("#goBtn").disabled)return;
  started=true; frozen=false; startRain();
  $("#gate").classList.add("gone"); $("#cross").style.opacity="1";
  if(!("ontouchstart" in window) && !QA.get("qa")) canvas.requestPointerLock();
  intro();
});
// 从走廊开门过场进来:不再停黑底按钮页,黑场直接淡进屋里
if(!QA.get("qa") && QA.get("from")==="corridor"){
  $("#gate").classList.add("gone");
  const fadeEl=$("#fadein"); fadeEl.style.opacity="1"; fadeEl.style.transition="none";
  started=true; frozen=false; $("#cross").style.opacity="1";
  setTimeout(()=>{ fadeEl.style.transition="opacity 1.8s"; fadeEl.style.opacity="0"; intro(); }, 350);
}
// 声音要用户手势才能开:第一次点击/按键时自动接上(顺手锁定视角)
{ const unlock=()=>{ const a=au(); if(a && a.state==="suspended") a.resume(); startRain();
    removeEventListener("pointerdown", unlock); removeEventListener("keydown", unlock); };
  addEventListener("pointerdown", unlock); addEventListener("keydown", unlock); }

// ===== QA 钩子 =====
if(QA.get("qa")){
  $("#gate").classList.add("gone"); started=true; frozen=false; startRain=()=>{};
  if(QA.get("px")) camera.position.x=parseFloat(QA.get("px"));
  if(QA.get("pz")) camera.position.z=parseFloat(QA.get("pz"));
  if(QA.get("yaw")) yaw=parseFloat(QA.get("yaw"));
  if(QA.get("pitch")) pitch=parseFloat(QA.get("pitch"));
  applyLook();
  const e=parseInt(QA.get("evt")||"0");
  if(e>=2){ sofaDone=true; }
  if(e>=3){ EVT=3; bathDoorOpen=true; bathDoorT=0.99; faceDone=true; doorSlammed=true; entryClosed=true; entryHinge.rotation.y=0; }
  if(e>=4){ mirrorSeen=true; figureMode="hall"; figure.visible=true; figMat.opacity=0.9; }
  if(e>=5){ EVT=5; figureGone=true; figureMode="gone"; figure.visible=false;
    for(const p of prints) p.material.opacity=0.75; mbLight.intensity=1.4; }
  if(QA.get("tv")==="1"){ tvOn=true; }
  if(QA.get("bed")==="1"){ bedSlammed=true; bedHinge.rotation.y=0; }
  if(QA.get("noise")){ noise=parseFloat(QA.get("noise")); $("#noise").style.display="block"; }
  if(QA.get("mom")==="1"){ momOut(); }
}
window.__room={ scene, camera, renderer, get EVT(){return EVT;}, set EVT(v){EVT=v;},
  set yaw(v){yaw=v;applyLook();}, set pitch(v){pitch=v;applyLook();},
  figure, mirror, solids, walkable, mom, momOut, addNoise,
  get noise(){return noise;}, set noise(v){noise=v;},
  get momState(){return momState;}, get dead(){return dead;},
  get hot(){return hot;}, act };
