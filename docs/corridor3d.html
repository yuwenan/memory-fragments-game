<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记忆碎片 · 走廊 3D 原型</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#e8d9b6;}
  #c3d{position:fixed;inset:0;display:block;}
  /* 加载 */
  #load{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;background:#050506;
    transition:opacity .8s ease;}
  #load.gone{opacity:0;pointer-events:none;}
  #load .t{font-size:16px;letter-spacing:4px;color:#8a7c60;}
  #load .bar{width:220px;height:2px;background:#1c1a15;overflow:hidden;}
  #load .bar i{display:block;height:100%;width:30%;background:#c9a24b;
    animation:ld 1s ease-in-out infinite;}
  @keyframes ld{0%{margin-left:-30%}100%{margin-left:100%}}
  /* HUD */
  #hint{position:fixed;left:0;right:0;bottom:26px;z-index:10;text-align:center;
    font-size:15px;letter-spacing:2px;color:#b6a487;text-shadow:0 2px 10px #000;
    pointer-events:none;transition:opacity .4s;}
  #prompt{position:fixed;z-index:12;transform:translate(-50%,-100%);
    padding:7px 15px;border:1px solid rgba(210,180,120,.5);border-radius:22px;
    background:rgba(18,14,9,.82);font-size:14px;letter-spacing:2px;white-space:nowrap;
    box-shadow:0 4px 18px rgba(0,0,0,.6),0 0 22px rgba(230,180,90,.15);cursor:pointer;
    opacity:0;pointer-events:none;transition:opacity .2s ease;}
  #prompt.show{opacity:1;pointer-events:auto;}
  #stub{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:24px;text-align:center;padding:0 24px;
    background:rgba(0,0,0,.9);opacity:0;pointer-events:none;transition:opacity .7s;}
  #stub.show{opacity:1;pointer-events:auto;}
  #stub p{max-width:640px;line-height:2.1;letter-spacing:2px;color:#c8bca2;
    white-space:pre-line;text-shadow:0 2px 8px #000;font-size:17px;}
  .btn{padding:11px 30px;border:1px solid rgba(200,170,110,.5);border-radius:4px;
    background:rgba(30,24,15,.6);color:#e6d6ac;font-size:15px;letter-spacing:3px;cursor:pointer;
    transition:background .15s,border-color .15s;}
  .btn:hover{background:rgba(60,48,28,.7);border-color:rgba(230,190,110,.8);}
  /* 触屏摇杆 */
  #pad{position:fixed;left:26px;bottom:30px;z-index:11;width:132px;height:132px;
    border-radius:50%;border:1px solid rgba(200,180,140,.22);background:rgba(20,16,10,.35);
    touch-action:none;display:none;}
  #pad i{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px;
    border-radius:50%;background:rgba(200,175,120,.35);border:1px solid rgba(220,190,130,.5);}
  #eBtn{position:fixed;right:30px;bottom:56px;z-index:11;width:78px;height:78px;
    border-radius:50%;border:1px solid rgba(210,180,120,.4);background:rgba(30,24,15,.5);
    color:#e6d6ac;font-size:20px;letter-spacing:2px;display:none;align-items:center;
    justify-content:center;touch-action:none;user-select:none;}
  @media (pointer:coarse){#pad{display:block;}#eBtn{display:flex;}}
  #tag{position:fixed;left:14px;top:12px;z-index:10;font-size:12px;letter-spacing:1px;
    color:#6b6252;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<div id="tag">走廊 3D 原型 · v0（占位角色，待换）</div>
<div id="hint">WASD / 方向键 走动 · 拖动鼠标转视角 · 走到发光的门前按 E 进入</div>
<div id="prompt"></div>
<div id="stub"><p id="stubText"></p><button class="btn" id="stubBack">回 到 走 廊</button></div>
<div id="pad"><i></i></div>
<div id="eBtn">E</div>
<div id="load"><div class="t">进入走廊…</div><div class="bar"><i></i></div></div>

<script type="importmap">
{ "imports": {
  "three": "./assets/lib/three.module.js",
  "three/addons/": "./assets/lib/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/GLTFLoader.js";

const $ = s => document.querySelector(s);
const canvas = $("#c3d");

// ===== 渲染器 / 场景 / 相机 =====
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050506);
scene.fog = new THREE.FogExp2(0x050506, 0.05);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);

// ===== 走廊尺寸 =====
const HALF_W = 3, HEIGHT = 4, Z_NEAR = 2, Z_FAR = -40;
const LEN = Z_NEAR - Z_FAR;
const MID_Z = (Z_NEAR + Z_FAR) / 2;

// 程序化脏旧混凝土贴图（避免灰盒子感）
function grungeTex(base, spec, repX, repY){
  const cv = document.createElement("canvas"); cv.width = cv.height = 256;
  const x = cv.getContext("2d");
  x.fillStyle = base; x.fillRect(0,0,256,256);
  for(let i=0;i<2600;i++){
    const a = Math.random()*0.10;
    x.fillStyle = `rgba(${spec},${a.toFixed(3)})`;
    const s = Math.random()*3+0.4;
    x.fillRect(Math.random()*256, Math.random()*256, s, s);
  }
  // 竖向水渍
  for(let i=0;i<26;i++){
    x.strokeStyle = `rgba(0,0,0,${(Math.random()*0.14).toFixed(3)})`;
    x.lineWidth = Math.random()*2+0.5; x.beginPath();
    const px = Math.random()*256; x.moveTo(px,0);
    x.bezierCurveTo(px+20,90,px-16,150,px+8,256); x.stroke();
  }
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(repX, repY);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const wallMat = new THREE.MeshStandardMaterial({ map:grungeTex("#2a2620","70,60,45", 4, 2), roughness:.96, metalness:.02 });
const floorMat= new THREE.MeshStandardMaterial({ map:grungeTex("#1d1a16","60,55,42", 6, 10), roughness:.9, metalness:.05 });
const ceilMat = new THREE.MeshStandardMaterial({ map:grungeTex("#211e19","55,48,38", 4, 8), roughness:1, metalness:0 });

function addPlane(mat, w, h, pos, rot){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  m.position.set(...pos); if(rot) m.rotation.set(...rot);
  m.receiveShadow = true; scene.add(m); return m;
}
// 地面 / 天花板
addPlane(floorMat, HALF_W*2, LEN, [0,0,MID_Z], [-Math.PI/2,0,0]);
addPlane(ceilMat,  HALF_W*2, LEN, [0,HEIGHT,MID_Z], [Math.PI/2,0,0]);
// 左右墙 / 尽头墙
addPlane(wallMat, LEN, HEIGHT, [-HALF_W, HEIGHT/2, MID_Z], [0, Math.PI/2, 0]);
addPlane(wallMat, LEN, HEIGHT, [ HALF_W, HEIGHT/2, MID_Z], [0,-Math.PI/2, 0]);
addPlane(wallMat, HALF_W*2, HEIGHT, [0, HEIGHT/2, Z_FAR], [0,0,0]);

// ===== 门（凹进墙面的门 + 门缝光 + 地面光晕）=====
const DOORS = [
  { id:"warm",  name:"透着暖光的门", side:-1, z:-9,  color:0xff9d3c,
    stub:"门缝下透出暖黄的光，像谁家亮着的客厅。\n你伸手推开它——\n\n（这扇门后的房间，还在建造中……）" },
  { id:"pixel", name:"透着幽蓝的门", side: 1, z:-17, color:0x4aa8ff,
    stub:"门缝下渗出幽蓝的光，一闪一闪，像老式屏幕。\n你伸手推开它——\n\n（这扇门后的房间，还在建造中……）" },
  { id:"cold",  name:"透着冷光的门", side:-1, z:-27, color:0xdfeaff,
    stub:"门缝下淌出一线惨白的冷光，让人脊背发凉。\n你伸手推开它——\n\n（这扇门后的房间，还在建造中……）" },
];
const DOOR_W = 1.3, DOOR_H = 2.7;
const doorMeshes = [];
for(const d of DOORS){
  const wx = d.side * (HALF_W - 0.02);
  const ry = d.side > 0 ? -Math.PI/2 : Math.PI/2;
  const g = new THREE.Group(); g.position.set(wx, 0, d.z); g.rotation.y = ry;
  // 门板（暗）
  const panel = new THREE.Mesh(new THREE.PlaneGeometry(DOOR_W, DOOR_H),
    new THREE.MeshStandardMaterial({ color:0x15120e, roughness:1 }));
  panel.position.set(0, DOOR_H/2, 0.01); g.add(panel);
  // 门框（发光边）
  const frameMat = new THREE.MeshBasicMaterial({ color:d.color });
  const mkBar = (w,h,x,y)=>{ const b=new THREE.Mesh(new THREE.PlaneGeometry(w,h),frameMat);
    b.position.set(x,y,0.02); g.add(b); };
  mkBar(DOOR_W+0.12,0.06, 0, DOOR_H+0.05);      // 顶缝
  mkBar(0.06,DOOR_H, -DOOR_W/2-0.05, DOOR_H/2);  // 左缝
  mkBar(0.06,DOOR_H,  DOOR_W/2+0.05, DOOR_H/2);  // 右缝
  mkBar(DOOR_W, 0.05, 0, 0.06);                  // 门底缝（最亮）
  scene.add(g);
  // 门口彩色点光（打在地面/墙上）
  const pl = new THREE.PointLight(d.color, 1.5, 7, 2);
  pl.position.set(wx - d.side*0.5, 0.5, d.z); scene.add(pl);
  // 地面光晕贴片
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(2.4,1.4),
    new THREE.MeshBasicMaterial({ color:d.color, transparent:true, opacity:0.16,
      blending:THREE.AdditiveBlending, depthWrite:false }));
  glow.rotation.x = -Math.PI/2; glow.position.set(wx - d.side*0.9, 0.02, d.z); scene.add(glow);
  doorMeshes.push({ d, x:wx, z:d.z, light:pl });
}

// ===== 灯光：整体极暗 + 走廊吊灯（会闪）=====
scene.add(new THREE.AmbientLight(0x2a2620, 0.6));
const lamps = [];
for(let z=-3; z>Z_FAR+3; z-=9){
  const L = new THREE.PointLight(0xffdca0, 2.2, 13, 2);
  L.position.set(0, HEIGHT-0.25, z); L.castShadow = true;
  L.shadow.mapSize.set(512,512); L.shadow.camera.far = 16;
  scene.add(L);
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.09,8,8),
    new THREE.MeshBasicMaterial({ color:0xffe6b0 }));
  bulb.position.copy(L.position); scene.add(bulb);
  lamps.push({ L, base:2.2 });
}

// ===== 角色（占位：Soldier.glb，含 Idle/Walk 动画）=====
const hero = new THREE.Group(); scene.add(hero);
hero.position.set(0, 0, -1.5);
let mixer=null, actIdle=null, actWalk=null, current=null, heroReady=false, MODEL_FACE=0;

new GLTFLoader().load("./assets/models/Soldier.glb", (gltf)=>{
  const model = gltf.scene;
  model.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.frustumCulled=false;
    if(o.material){ o.material.metalness=0; o.material.roughness=1; } }});
  model.scale.setScalar(1.15);
  hero.add(model);
  mixer = new THREE.AnimationMixer(model);
  const byName = n => gltf.animations.find(a=>a.name.toLowerCase()===n);
  const walkClip = byName("walk") || gltf.animations[3] || gltf.animations[0];
  const idleClip = byName("idle") || gltf.animations[0];
  actWalk = mixer.clipAction(walkClip); actIdle = mixer.clipAction(idleClip);
  actIdle.play(); current = actIdle;
  heroReady = true;
  $("#load").classList.add("gone");
}, undefined, (err)=>{ $("#load .t").textContent = "角色加载失败：" + err; });

// ===== 控制：WASD 移动（相对相机）+ 拖动转视角 =====
const keys = {};
addEventListener("keydown", e=>{ const k=e.key.toLowerCase();
  if(["w","a","s","d","arrowup","arrowdown","arrowleft","arrowright"].includes(k)){ keys[k]=true; e.preventDefault(); }
  if(k==="e"||k==="enter"||k===" "){ tryEnter(); e.preventDefault(); }
});
addEventListener("keyup", e=>{ keys[e.key.toLowerCase()]=false; });

let camYaw = Math.PI;      // 相机绕角色的水平角（初始在角色身后）
let dragging=false, lastX=0;
canvas.addEventListener("pointerdown", e=>{ dragging=true; lastX=e.clientX; });
addEventListener("pointerup", ()=>dragging=false);
addEventListener("pointermove", e=>{ if(dragging){ camYaw -= (e.clientX-lastX)*0.006; lastX=e.clientX; }});

// 触屏摇杆
const pad=$("#pad"), stick=pad.querySelector("i");
let padActive=false, padVec={x:0,y:0};
pad.addEventListener("pointerdown", e=>{ padActive=true; padMove(e); pad.setPointerCapture(e.pointerId); });
pad.addEventListener("pointermove", e=>{ if(padActive) padMove(e); });
pad.addEventListener("pointerup", ()=>{ padActive=false; padVec={x:0,y:0}; stick.style.transform="translate(0,0)"; });
function padMove(e){ const r=pad.getBoundingClientRect();
  let dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2);
  const m=Math.hypot(dx,dy), max=r.width/2-10; if(m>max){ dx*=max/m; dy*=max/m; }
  padVec={x:dx/max, y:dy/max}; stick.style.transform=`translate(${dx}px,${dy}px)`;
}
$("#eBtn").addEventListener("pointerdown", e=>{ e.preventDefault(); tryEnter(); });

// ===== 门口检测 / 进门 =====
const promptEl=$("#prompt"), stubEl=$("#stub"), hintEl=$("#hint");
let atDoor=null, entering=false;
const _v = new THREE.Vector3();
function updateDoorPrompt(){
  if(entering) return;
  let near=null, best=2.4;
  for(const dm of doorMeshes){
    const dist = Math.hypot(hero.position.x-dm.x, hero.position.z-dm.z);
    if(dist<best){ best=dist; near=dm; }
  }
  if(near!==atDoor){
    atDoor=near;
    if(near){ promptEl.textContent="按 E 进入 · "+near.d.name; promptEl.classList.add("show"); }
    else promptEl.classList.remove("show");
  }
  if(atDoor){ // 提示跟随门在屏幕上的位置
    _v.set(atDoor.x - atDoor.d.side*0.3, 2.2, atDoor.z).project(camera);
    promptEl.style.left = (_v.x*0.5+0.5)*innerWidth + "px";
    promptEl.style.top  = (-_v.y*0.5+0.5)*innerHeight + "px";
    promptEl.style.display = _v.z<1 ? "block" : "none";
  }
}
function tryEnter(){
  if(entering || !atDoor) return;
  entering=true; keysClear();
  promptEl.classList.remove("show");
  $("#stubText").textContent = atDoor.d.stub;
  stubEl.classList.add("show");
}
$("#stubBack").addEventListener("click", ()=>{
  stubEl.classList.remove("show");
  setTimeout(()=>{ entering=false; atDoor=null; }, 300);
});
function keysClear(){ for(const k in keys) keys[k]=false; padVec={x:0,y:0}; }

// ===== 主循环 =====
const clock = new THREE.Clock();
const MOVE = 3.2;                       // 移动速度 (米/秒)
const camOffset = new THREE.Vector3();
let flickT = 0;

function step(dt){
  // 输入 → 期望移动方向（相对相机朝向）
  let ix=0, iz=0;
  if(keys["w"]||keys["arrowup"]) iz-=1;
  if(keys["s"]||keys["arrowdown"]) iz+=1;
  if(keys["a"]||keys["arrowleft"]) ix-=1;
  if(keys["d"]||keys["arrowright"]) ix+=1;
  if(padActive){ ix+=padVec.x; iz+=padVec.y; }
  const mag = Math.hypot(ix,iz);
  const moving = mag>0.08 && !entering;

  if(moving){
    // 相机前方（水平）
    const fwdX = Math.sin(camYaw), fwdZ = Math.cos(camYaw);
    const rightX = Math.sin(camYaw+Math.PI/2), rightZ = Math.cos(camYaw+Math.PI/2);
    let dx = fwdX*(-iz) + rightX*(ix);
    let dz = fwdZ*(-iz) + rightZ*(ix);
    const dl = Math.hypot(dx,dz); dx/=dl; dz/=dl;
    hero.position.x += dx*MOVE*dt;
    hero.position.z += dz*MOVE*dt;
    // 边界：留在走廊内
    hero.position.x = Math.max(-HALF_W+0.5, Math.min(HALF_W-0.5, hero.position.x));
    hero.position.z = Math.max(Z_FAR+0.8, Math.min(Z_NEAR-0.4, hero.position.z));
    // 角色转向移动方向
    const targetRot = Math.atan2(dx, dz) + MODEL_FACE;
    let dr = targetRot - hero.rotation.y;
    while(dr>Math.PI) dr-=Math.PI*2; while(dr<-Math.PI) dr+=Math.PI*2;
    hero.rotation.y += dr*Math.min(1, dt*12);
  }

  // 动画切换 Idle <-> Walk
  if(heroReady){
    const want = moving ? actWalk : actIdle;
    if(want!==current){ want.reset().fadeIn(0.18).play(); current.fadeOut(0.18); current=want; }
    mixer.update(dt);
  }

  // 相机跟随（在角色身后 camYaw 方向）
  camOffset.set(Math.sin(camYaw)*4.2, 2.3, Math.cos(camYaw)*4.2);
  const camTarget = _v.set(hero.position.x - camOffset.x, camOffset.y, hero.position.z - camOffset.z);
  camera.position.lerp(camTarget, Math.min(1, dt*6));
  camera.lookAt(hero.position.x, 1.3, hero.position.z);

  // 吊灯闪烁
  flickT += dt;
  for(let i=0;i<lamps.length;i++){
    const f = 0.82 + Math.sin(flickT*7 + i*2.1)*0.05 + (Math.random()<0.03? -0.4:0);
    lamps[i].L.intensity = lamps[i].base * f;
  }

  updateDoorPrompt();
  if(hintEl.style.opacity!=="0" && (moving)) { /* 保持提示，走动不隐藏 */ }
}
function render(){ renderer.render(scene, camera); }

let raf;
function loop(){ raf=requestAnimationFrame(loop); step(Math.min(0.05, clock.getDelta())); render(); }
loop();

// 尺寸自适应
function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); }
addEventListener("resize", resize); resize();

// ===== QA 调试钩子（后台标签 rAF 被暂停时手动步进）=====
window.__mf3d = {
  scene, camera, hero, doorMeshes, keys,
  step, render,
  get camYaw(){ return camYaw; }, set camYaw(v){ camYaw=v; },
  setFace(f){ MODEL_FACE=f; },
  frame(dt){ step(dt||0.016); render(); },
};
</script>
</body>
</html>
