<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记忆碎片 · 走廊（第一人称 3D）</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#e5d7b8;}
  #c3d{position:fixed;inset:0;display:block;}
  /* 后期叠层：暗角 + 胶片颗粒 */
  #vig{position:fixed;inset:0;z-index:5;pointer-events:none;
    background:radial-gradient(ellipse 66% 60% at 50% 48%,transparent 40%,rgba(0,0,0,.72) 100%);}
  #grain{position:fixed;inset:-50%;z-index:6;pointer-events:none;opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain .5s steps(2) infinite;}
  @keyframes grain{0%{transform:translate(0,0)}50%{transform:translate(-6%,4%)}100%{transform:translate(4%,-5%)}}
  /* HUD */
  #hint{position:fixed;left:0;right:0;bottom:30px;z-index:10;text-align:center;
    font-size:15px;letter-spacing:2px;color:#b6a487;text-shadow:0 2px 10px #000;pointer-events:none;
    transition:opacity .5s;}
  #cross{position:fixed;left:50%;top:50%;z-index:8;width:5px;height:5px;margin:-2.5px;border-radius:50%;
    background:rgba(230,220,190,.5);box-shadow:0 0 4px rgba(0,0,0,.8);pointer-events:none;opacity:0;transition:opacity .3s;}
  #prompt{position:fixed;left:50%;top:56%;z-index:9;transform:translateX(-50%);
    padding:8px 18px;border:1px solid rgba(210,180,120,.5);border-radius:24px;
    background:rgba(18,14,9,.82);font-size:15px;letter-spacing:2px;white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 24px rgba(230,180,90,.14);
    opacity:0;pointer-events:none;transition:opacity .2s;}
  #prompt.show{opacity:1;}
  #stub{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:24px;text-align:center;padding:0 24px;background:rgba(0,0,0,.9);
    opacity:0;pointer-events:none;transition:opacity .7s;}
  #stub.show{opacity:1;pointer-events:auto;}
  #stub p{max-width:640px;line-height:2.1;letter-spacing:2px;color:#c8bca2;white-space:pre-line;
    text-shadow:0 2px 8px #000;font-size:17px;}
  #restart{position:fixed;inset:0;z-index:22;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:26px;text-align:center;padding:0 24px;background:rgba(0,0,0,.9);
    opacity:0;pointer-events:none;transition:opacity .5s;}
  #restart.show{opacity:1;pointer-events:auto;}
  #restart p{max-width:560px;line-height:2;letter-spacing:2px;color:#cbbfa6;font-size:17px;text-shadow:0 2px 8px #000;}
  #restart b{color:#e6c078;}
  .rs-btns{display:flex;gap:18px;}
  .btn{padding:11px 30px;border:1px solid rgba(200,170,110,.5);border-radius:4px;background:rgba(30,24,15,.6);
    color:#e6d6ac;font-size:15px;letter-spacing:3px;cursor:pointer;}
  .btn:hover{background:rgba(60,48,28,.7);}
  .btn.ghost{border-color:rgba(150,140,120,.4);color:#a99;background:rgba(20,18,14,.5);}
  /* 结局黑暗反转 */
  #ending{position:fixed;inset:0;z-index:40;background:#000;opacity:0;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.5s;}
  #ending.show{opacity:1;pointer-events:auto;}
  #ending .eln{position:absolute;max-width:70%;text-align:center;font-size:22px;line-height:2;
    letter-spacing:3px;color:#d8cba8;text-shadow:0 2px 14px #000;opacity:0;transition:opacity 2s;}
  #ending .eln.show{opacity:1;}
  #ending .ewalk{position:absolute;bottom:22%;left:50%;width:120px;height:206px;margin-left:-60px;
    background:url("assets/characters/walk_strip.png") 0 center/auto 206px repeat-x;
    filter:brightness(.32) blur(.4px);opacity:0;animation:walk .85s steps(4) infinite;}
  #ending .ewalk.show{animation:walk .85s steps(4) infinite, walkaway 7s ease-in forwards;}
  @keyframes walkaway{0%{opacity:.9;transform:translateY(0) scale(1)}
    85%{opacity:.5}100%{opacity:0;transform:translateY(-120px) scale(.28)}}
  #ending .efin{position:absolute;display:flex;flex-direction:column;align-items:center;gap:20px;
    opacity:0;transition:opacity 2.5s;}
  #ending .efin.show{opacity:1;}
  #ending .eft{font-size:30px;letter-spacing:14px;color:#c9b98a;}
  #ending .efs{font-size:14px;letter-spacing:2px;color:#8a7f66;max-width:520px;text-align:center;line-height:1.9;}
  /* 点击开始 / 加载 */
  #gate{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:20px;background:#050506;text-align:center;transition:opacity .8s;}
  #gate.gone{opacity:0;pointer-events:none;}
  #gate h1{font-size:22px;letter-spacing:8px;font-weight:400;color:#cbb98c;margin:0;}
  #gate .s{font-size:13px;letter-spacing:3px;color:#7d715a;}
  #gate .go{margin-top:6px;padding:12px 34px;border:1px solid rgba(200,170,110,.55);border-radius:4px;
    background:rgba(30,24,15,.5);color:#e6d6ac;font-size:15px;letter-spacing:4px;cursor:pointer;}
  #gate .go[disabled]{opacity:.4;cursor:default;}
  /* 触屏 */
  #pad{position:fixed;left:26px;bottom:32px;z-index:11;width:128px;height:128px;border-radius:50%;
    border:1px solid rgba(200,180,140,.22);background:rgba(20,16,10,.32);touch-action:none;display:none;}
  #pad i{position:absolute;left:50%;top:50%;width:50px;height:50px;margin:-25px;border-radius:50%;
    background:rgba(200,175,120,.32);border:1px solid rgba(220,190,130,.5);}
  #eBtn{position:fixed;right:30px;bottom:60px;z-index:11;width:76px;height:76px;border-radius:50%;
    border:1px solid rgba(210,180,120,.4);background:rgba(30,24,15,.5);color:#e6d6ac;font-size:20px;
    display:none;align-items:center;justify-content:center;touch-action:none;}
  @media (pointer:coarse){#pad{display:block;}#eBtn{display:flex;}}
  #tag{position:fixed;left:14px;top:12px;z-index:10;font-size:12px;letter-spacing:1px;color:#6b6252;pointer-events:none;}
  #blk{position:fixed;inset:0;z-index:13;background:#000;opacity:0;pointer-events:none;transition:opacity 1s;}
  #blk.show{opacity:1;}
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<div id="blk"></div>
<div id="vig"></div><div id="grain"></div>
<div id="cross"></div>
<div id="tag">走廊 · 第一人称 3D（做对版）</div>
<div id="hint">点击画面进入 · WASD / 方向键 走动 · 鼠标转头 · 看着发光的门按 E 进入</div>
<div id="prompt"></div>
<div id="stub"><p id="stubText"></p><button class="btn" id="stubBack">回 到 走 廊</button></div>
<div id="restart"><p>这是你走出来的门——觉醒室。<br>回去会<b>重新开始本局</b>，走廊里的进度将清空。</p>
  <div class="rs-btns"><button class="btn" id="rsYes">重 新 开 始</button><button class="btn ghost" id="rsNo">留 在 走 廊</button></div></div>
<!-- 结局：穿过镜子（黑暗反转） -->
<div id="ending">
  <div class="eln" id="eln1">镜子里的人，缓缓抬起了头。</div>
  <div class="eln" id="eln2">它看着你——用你的脸，冲你笑了一下。</div>
  <div class="ewalk" id="ewalk"></div>
  <div class="eln" id="eln3">它穿过你，走了出去。<br>去过你的人生。</div>
  <div class="eln" id="eln4">你被留在了玻璃的另一面。<br>灯，灭了。</div>
  <div class="efin" id="efin">
    <div class="eft">记 忆 碎 片</div>
    <div class="efs">你从来不是在找回自己——你在把取代你的东西，补完整。</div>
    <button class="btn" id="eRestart">重 新 开 始</button>
  </div>
</div>
<div id="pad"><i></i></div>
<div id="eBtn">E</div>
<div id="gate">
  <h1>记 忆 碎 片</h1>
  <div class="s">走 廊 · 第 一 人 称</div>
  <button class="go" id="goBtn" disabled>载入中…</button>
  <div class="s" id="gateHint">正在载入贴图与灯光</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "./assets/lib/three.module.js",
  "three/addons/": "./assets/lib/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import { Reflector } from "three/addons/objects/Reflector.js";

const $ = s => document.querySelector(s);
const canvas = $("#c3d");

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040405);
scene.fog = new THREE.FogExp2(0x05060a, 0.026);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.05, 120);
camera.position.set(0, 1.62, 0.6);   // 起点靠前，身后留出「觉醒室」那扇开着的门

// ===== 走廊尺寸 =====
const HW = 3, H = 4, Z0 = 2, Z1 = -42, LEN = Z0 - Z1, MZ = (Z0 + Z1) / 2;

// ===== 贴图 =====
const maxAniso = renderer.capabilities.getMaxAnisotropy();
const manager = new THREE.LoadingManager();
const texL = new THREE.TextureLoader(manager);
function pbr(name, repX, repY) {
  const load = (suffix, srgb) => {
    const t = texL.load(`./assets/textures/${name}_${suffix}.jpg`);
    t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(repX, repY);
    t.anisotropy = maxAniso; if (srgb) t.colorSpace = THREE.SRGBColorSpace;
    return t;
  };
  return new THREE.MeshStandardMaterial({
    map: load("color", true), normalMap: load("normal", false), roughnessMap: load("rough", false),
    roughness: 1.0, metalness: 0.0, normalScale: new THREE.Vector2(1.1, 1.1),
    color: 0x8a8880,
  });
}
const wallMat  = pbr("wall", 6, 2);
const floorMat = pbr("floor", 4, 14);
const ceilMat  = pbr("floor", 4, 12);
floorMat.color = new THREE.Color(0x6f6d68); ceilMat.color = new THREE.Color(0x54524d);

function plane(mat, w, h, pos, rot) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  m.position.set(...pos); if (rot) m.rotation.set(...rot);
  m.receiveShadow = true; scene.add(m); return m;
}
plane(floorMat, HW*2, LEN, [0, 0, MZ], [-Math.PI/2, 0, 0]);
plane(ceilMat,  HW*2, LEN, [0, H, MZ], [Math.PI/2, 0, 0]);
plane(wallMat, LEN, H, [-HW, H/2, MZ], [0, Math.PI/2, 0]);
plane(wallMat, LEN, H, [ HW, H/2, MZ], [0, -Math.PI/2, 0]);
plane(wallMat, HW*2, H, [0, H/2, Z1], [0, 0, 0]);
plane(wallMat, HW*2, H, [0, H/2, Z0], [0, Math.PI, 0]);
// 墙裙线+踢脚线(B 老公寓)
{ const trimM = new THREE.MeshStandardMaterial({ color:0xb0a482, roughness:.62 });
  for (const sx of [-1,1]) {
    const base = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.16, LEN), trimM);
    base.position.set(sx*(HW-0.025), 0.08, MZ); scene.add(base);
    const rail = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.07, LEN), trimM);
    rail.position.set(sx*(HW-0.02), 1.02, MZ); scene.add(rail);
  } }

// ===== 门 =====
const DOORS = [
  { id:"warm",  name:"透着暖光的门", side:-1, z:-9,  color:0xff9a34,
    stub:"门缝下透出暖黄的光，像谁家亮着的客厅。\n你伸手推开它——\n\n（这扇门后的房间，还在建造中……）" },
  { id:"pixel", name:"透着幽蓝的门", side: 1, z:-18, color:0x49a6ff,
    stub:"门缝下渗出幽蓝的光，一闪一闪，像老式屏幕。\n你伸手推开它——\n\n（这扇门后的房间，还在建造中……）" },
  { id:"cold",  name:"透着冷光的门", side:-1, z:-29, color:0xe2ecff,
    stub:"门缝下淌出一线惨白的冷光，让人脊背发凉。\n你伸手推开它——\n\n（这扇门后的房间，还在建造中……）" },
];
const DW = 1.06, DH = 2.42, doorObjs = [];
// 共用材质:奶白漆木 / 黄铜(B 方向·老公寓)
const paintLite = new THREE.MeshStandardMaterial({ color:0xcfc4a6, roughness:.55 });
const paintDark = new THREE.MeshStandardMaterial({ color:0xb0a482, roughness:.6 });
const brass = new THREE.MeshStandardMaterial({ color:0x9a7f3c, roughness:.28, metalness:.95 });
const doorMetal = paintLite, boltMetal = brass;   // 觉醒室那扇沿用变量名,自动变木门
// 软径向光晕贴图(中心亮→边缘透明)
const GLOW = (()=>{ const cv=document.createElement("canvas"); cv.width=cv.height=128; const x=cv.getContext("2d");
  const g=x.createRadialGradient(64,64,0,64,64,64); g.addColorStop(0,"rgba(255,255,255,1)");
  g.addColorStop(.45,"rgba(255,255,255,.42)"); g.addColorStop(1,"rgba(255,255,255,0)");
  x.fillStyle=g; x.fillRect(0,0,128,128); return new THREE.CanvasTexture(cv); })();
const lightSrc = hex => new THREE.Color(hex).lerp(new THREE.Color(0xffffff), 0.55);
for (const d of DOORS) {
  const wx = d.side * (HW - 0.02), ry = d.side > 0 ? -Math.PI/2 : Math.PI/2;
  const g = new THREE.Group(); g.position.set(wx, 0, d.z); g.rotation.y = ry; scene.add(g);
  const add = (mesh, x, y, zz) => { mesh.position.set(x, y, zz); g.add(mesh); return mesh; };

  // 奶白门框 + 黑门洞
  const frame = new THREE.Mesh(new THREE.BoxGeometry(DW+0.30, DH+0.30, 0.14), paintLite);
  add(frame, 0, (DH+0.30)/2, -0.03).castShadow = true;
  const hole = new THREE.Mesh(new THREE.BoxGeometry(DW+0.08, DH+0.14, 0.12),
    new THREE.MeshBasicMaterial({ color:0x060504 }));
  add(hole, 0, (DH+0.14)/2, -0.02);
  // 洞内光雾:开门后光像从房间里涌出来(平时被门板挡住)
  const innerGlow = new THREE.Mesh(new THREE.PlaneGeometry(DW*1.15, DH*1.05),
    new THREE.MeshBasicMaterial({ map:GLOW, color:d.color, transparent:true, opacity:.55,
      blending:THREE.AdditiveBlending, depthWrite:false }));
  add(innerGlow, 0, DH/2, 0.02);

  // 门板(铰链组,可整扇转开)
  const hinge = new THREE.Group(); hinge.position.set(-DW/2, 0, 0.06); g.add(hinge);
  const leaf = new THREE.Mesh(new THREE.BoxGeometry(DW, DH, 0.055), paintLite);
  leaf.position.set(DW/2, DH/2, 0); leaf.castShadow = true; hinge.add(leaf);
  for (const [yy, hh] of [[DH*0.28, DH*0.30],[DH*0.60, DH*0.14]]) {
    const inset = new THREE.Mesh(new THREE.BoxGeometry(DW-0.30, hh, 0.02), paintDark);
    inset.position.set(DW/2, yy, 0.032); hinge.add(inset);
  }
  // 黄铜球把手 + 锁牌 + 门顶小铜牌
  const knob = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 10), brass);
  knob.position.set(DW-0.13, 1.12, 0.075); hinge.add(knob);
  const kplate = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.17, 0.016), brass);
  kplate.position.set(DW-0.13, 1.12, 0.038); hinge.add(kplate);
  const plate = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.075, 0.014), brass);
  plate.position.set(DW/2, DH-0.13, 0.038); hinge.add(plate);
  // 磨砂亮窗(门上部,透出房间颜色的光=房间的性格)
  const winW = DW-0.36, winH = 0.40;
  const winFrame = new THREE.Mesh(new THREE.BoxGeometry(winW+0.12, winH+0.12, 0.03), paintDark);
  winFrame.position.set(DW/2, DH-0.45, 0.032); hinge.add(winFrame);
  const frosted = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH),
    new THREE.MeshStandardMaterial({ color:lightSrc(d.color), emissive:d.color, emissiveIntensity:1.3, roughness:.9 }));
  frosted.position.set(DW/2, DH-0.45, 0.052); hinge.add(frosted);
  const winGlow = new THREE.Mesh(new THREE.PlaneGeometry(winW*2.0, winH*2.6),
    new THREE.MeshBasicMaterial({ map:GLOW, color:d.color, transparent:true, opacity:.34, blending:THREE.AdditiveBlending, depthWrite:false }));
  winGlow.position.set(DW/2, DH-0.45, 0.09); hinge.add(winGlow);

  // 门底缝光 + 漫出软光 + 地面光池 + 门口点光源(保留旧做法)
  const crack = new THREE.Mesh(new THREE.PlaneGeometry(DW*0.92, 0.03),
    new THREE.MeshBasicMaterial({ color:lightSrc(d.color) }));
  add(crack, 0, 0.02, 0.065);
  const underGlow = new THREE.Mesh(new THREE.PlaneGeometry(DW*1.35, 0.75),
    new THREE.MeshBasicMaterial({ map:GLOW, color:d.color, transparent:true, opacity:.5, blending:THREE.AdditiveBlending, depthWrite:false }));
  add(underGlow, 0, 0.12, 0.07);
  const pl = new THREE.PointLight(d.color, 2.0, 7.5, 2.5); pl.position.set(wx - d.side*0.5, 0.65, d.z); scene.add(pl);
  const pool = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 2.4),
    new THREE.MeshBasicMaterial({ map:GLOW, color:d.color, transparent:true, opacity:.5, blending:THREE.AdditiveBlending, depthWrite:false }));
  pool.rotation.x = -Math.PI/2; pool.position.set(wx - d.side*0.8, 0.02, d.z); scene.add(pool);

  // 门两侧壁灯(暖光,B 方向的关键氛围)
  for (const dxl of [-(DW/2+0.62), DW/2+0.62]) {
    const sconce = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.085, 0.17, 10, 1, true),
      new THREE.MeshStandardMaterial({ color:0xd8c9a2, emissive:0x6b4d1c, emissiveIntensity:1, side:THREE.DoubleSide }));
    add(sconce, dxl, 2.12, 0.10);
    const sl = new THREE.PointLight(0xffd9a2, 0.85, 4.5, 2);
    sl.position.set(wx - d.side*0.16, 2.18, d.z + dxl*(d.side>0?1:-1)); scene.add(sl);
  }
  doorObjs.push({ d, x:wx, z:d.z, hinge, pl, plBase:2.0 });
}

// ===== 你走出来的那扇门（觉醒室）——开着的；进它 = 重新开始本局 =====
{
  const ox = 0.55;
  const g = new THREE.Group(); g.position.set(ox, 0, Z0); g.rotation.y = Math.PI; scene.add(g);
  const jamb = new THREE.Mesh(new THREE.BoxGeometry(DW+0.36, DH+0.32, 0.34),
    new THREE.MeshStandardMaterial({ color:0x2a2620, roughness:.95, metalness:.05 }));
  jamb.position.set(0, (DH+0.32)/2, -0.15); g.add(jamb);
  // 门洞里的黑，透出觉醒室残留的暖微光
  const inside = new THREE.Mesh(new THREE.PlaneGeometry(DW, DH), new THREE.MeshBasicMaterial({ color:0x080604 }));
  inside.position.set(0, DH/2, -0.02); g.add(inside);
  const warm = new THREE.PointLight(0xffab55, 1.5, 6.5, 2.2); warm.position.set(0, 1.5, -0.7); g.add(warm);
  // 敞开的门板（铰链在左，朝走廊里转开）
  const hinge = new THREE.Group(); hinge.position.set(-DW/2, 0, 0.07); g.add(hinge);
  const leaf = new THREE.Mesh(new THREE.BoxGeometry(DW, DH, 0.08), doorMetal);
  leaf.position.set(DW/2, DH/2, 0); leaf.castShadow = true; hinge.add(leaf);
  const handle2 = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.22,0.09), boltMetal);
  handle2.position.set(DW-0.18, DH*0.42, 0.09); hinge.add(handle2);
  hinge.rotation.y = 1.95;   // 门开着
  doorObjs.push({ d:{ name:"觉醒室", prompt:"按 E 回到觉醒室 · 重新开始本局", origin:true }, x:ox, z:Z0 });
}

// ===== 走廊尽头：镜子（镜像计划的终点）=====
// 脏雾裂纹的镜面，里面站着「你/镜像」正面立绘；每通关一间房擦亮一分、脸清一分；全清才能穿过
// 跨页进度：房间是独立页，通关记在 localStorage
const ROOM_URLS = { warm:"room_warm.html", pixel:"room_pixel.html" };   // cold 待建
const CLEARED = (()=>{ try{ return new Set(JSON.parse(localStorage.getItem("mf3d_cleared")||"[]")); }catch(e){ return new Set(); } })();
function saveCleared(){ try{ localStorage.setItem("mf3d_cleared", JSON.stringify([...CLEARED])); }catch(e){} }
const visited = CLEARED;   // 门口检测/文案沿用
const mirror = { progress: CLEARED.size/3, clarity: CLEARED.size/3 };  // 返回走廊直接呈现已擦亮
const MIR_W = 1.55, MIR_H = 2.55, MIR_Z = Z1 + 0.12;
function mirrorGrime(){
  const cv = document.createElement("canvas"); cv.width = cv.height = 512; const x = cv.getContext("2d");
  x.fillStyle = "rgba(26,30,32,0.8)"; x.fillRect(0,0,512,512);
  for (let i=0;i<240;i++){ const r=Math.random()*58+8, gx=Math.random()*512, gy=Math.random()*512;
    const g=x.createRadialGradient(gx,gy,0,gx,gy,r);
    g.addColorStop(0,`rgba(${18+Math.random()*28|0},${22+Math.random()*28|0},${24+Math.random()*28|0},${(Math.random()*0.5).toFixed(2)})`);
    g.addColorStop(1,"rgba(0,0,0,0)"); x.fillStyle=g; x.beginPath(); x.arc(gx,gy,r,0,7); x.fill(); }
  for (let i=0;i<26;i++){ x.strokeStyle=`rgba(58,64,62,${(Math.random()*0.24).toFixed(2)})`; x.lineWidth=Math.random()*8+2;
    const px=Math.random()*512; x.beginPath(); x.moveTo(px,0); x.bezierCurveTo(px+30,180,px-20,320,px+12,512); x.stroke(); }
  const cx0=170+Math.random()*180, cy0=150+Math.random()*160; x.strokeStyle="rgba(198,208,220,0.5)";
  for (let i=0;i<10;i++){ x.lineWidth=Math.random()*1.4+0.4; let a=Math.random()*7, len=Math.random()*210+60, px=cx0, py=cy0;
    x.beginPath(); x.moveTo(px,py); for(let s=0;s<5;s++){ a+=(Math.random()-0.5)*0.6; px+=Math.cos(a)*len/5; py+=Math.sin(a)*len/5; x.lineTo(px,py);} x.stroke(); }
  return new THREE.CanvasTexture(cv);
}
const selfTex = texL.load("./assets/characters/mirror_self.png"); selfTex.colorSpace = THREE.SRGBColorSpace;
const CY = MIR_H/2 + 0.12;                 // 镜子竖直中心
// 真反射镜面（照出走廊/吊灯/手电）——这才让它像镜子
const reflector = new Reflector(new THREE.PlaneGeometry(MIR_W, MIR_H), {
  textureWidth: 1024, textureHeight: 1024, color: 0x3a4048, clipBias: 0.003 });
reflector.position.set(0, CY, MIR_Z-0.05); scene.add(reflector);
// 反射渲染时把「镜中人」和脏雾藏掉，避免被镜面二次反射出鬼影
reflector.onBeforeRender = (function(orig){ return function(r,s,c){
  const a=selfFig.visible, b=glass.visible; selfFig.visible=false; glass.visible=false;
  orig.call(this,r,s,c); selfFig.visible=a; glass.visible=b;
}; })(reflector.onBeforeRender);
// 镜中人（正面立绘），叠在反射前、玻璃后 = 你的「倒影」站在镜子里
const selfMat = new THREE.MeshBasicMaterial({ map:selfTex, transparent:true, opacity:0.1, depthWrite:false, color:0x8a97a6 });
const selfFig = new THREE.Mesh(new THREE.PlaneGeometry(MIR_W*0.9, MIR_H*0.95), selfMat);
selfFig.position.set(0, MIR_H*0.485+0.12, MIR_Z-0.03); scene.add(selfFig);
// 脏雾裂纹玻璃层（最前）
const grimeMat = new THREE.MeshBasicMaterial({ map:mirrorGrime(), transparent:true, opacity:0.9, depthWrite:false });
const glass = new THREE.Mesh(new THREE.PlaneGeometry(MIR_W, MIR_H), grimeMat);
glass.position.set(0, CY, MIR_Z); scene.add(glass);
// 边框：4 条金属边，只包边不挡中间（这是之前那个致命 bug：整块实心框把镜中人挡住了）
const frameMat = new THREE.MeshStandardMaterial({ color:0x14120f, roughness:.45, metalness:.75 });
const fz = MIR_Z + 0.04;
const mkBar = (w,h,x,y)=>{ const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.12), frameMat);
  b.position.set(x, y, fz); b.castShadow=true; scene.add(b); };
mkBar(MIR_W+0.26, 0.15, 0, CY + MIR_H/2 + 0.05);
mkBar(MIR_W+0.26, 0.15, 0, CY - MIR_H/2 - 0.05);
mkBar(0.15, MIR_H+0.26, -MIR_W/2 - 0.05, CY);
mkBar(0.15, MIR_H+0.26,  MIR_W/2 + 0.05, CY);
const mglow = new THREE.PointLight(0x9db4d0, 1.0, 13, 2); mglow.position.set(0, 1.6, Z1+1.4); scene.add(mglow);
doorObjs.push({ d:{ name:"镜子", mirror:true }, x:0, z:MIR_Z });

// ===== 灯光 =====
scene.add(new THREE.AmbientLight(0x2c3038, 2.6));
const lamps = [];
for (let z = -3; z > Z1+3; z -= 9) {
  const L = new THREE.PointLight(0xffd79a, 5, 18, 2); L.position.set(0, H-0.3, z);
  L.castShadow = true; L.shadow.mapSize.set(512,512); L.shadow.bias = -0.002; scene.add(L);
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({ color:0xffe6b4 }));
  bulb.position.copy(L.position); scene.add(bulb);
  const cage = new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.2,0.34,8,1,true),
    new THREE.MeshStandardMaterial({ color:0x1a1712, roughness:.6, metalness:.6, side:THREE.DoubleSide }));
  cage.position.set(0, H-0.28, z); scene.add(cage);
  lamps.push({ L, base:5 });
}
// 手电筒
const flash = new THREE.SpotLight(0xfff2d8, 2.0, 26, Math.PI/5, 0.6, 1.4);
flash.castShadow = true; flash.shadow.mapSize.set(1024,1024); flash.shadow.camera.far = 24;
scene.add(flash); scene.add(flash.target);

// ===== 第一人称控制（自写：偏航/俯仰，桌面指针锁定 + 触屏拖动）=====
let yaw = 0, pitch = 0;   // 初始朝走廊深处 (-Z)
const keys = {};
const euler = new THREE.Euler(0, 0, 0, "YXZ");
function applyLook(){ euler.set(pitch, yaw, 0); camera.quaternion.setFromEuler(euler); }
applyLook();

addEventListener("keydown", e => { const k = e.key.toLowerCase();
  if (["w","a","s","d","arrowup","arrowdown","arrowleft","arrowright"].includes(k)) { keys[k]=true; e.preventDefault(); }
  if (k === "e" || k === "enter") tryEnter();
});
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// 桌面：指针锁定
const SENS = 0.0022;
canvas.addEventListener("click", () => { if (started && !document.pointerLockElement) canvas.requestPointerLock(); });
addEventListener("mousemove", e => {
  if (document.pointerLockElement === canvas) {
    yaw -= e.movementX * SENS; pitch -= e.movementY * SENS;
    pitch = Math.max(-1.3, Math.min(1.3, pitch)); applyLook();
  }
});
// 触屏：右半屏拖动看，左侧摇杆走
let padActive=false, padVec={x:0,y:0}, look={id:null,x:0,y:0};
const pad=$("#pad"), stick=pad.querySelector("i");
pad.addEventListener("pointerdown", e=>{ padActive=true; padMove(e); pad.setPointerCapture(e.pointerId); });
pad.addEventListener("pointermove", e=>{ if(padActive) padMove(e); });
pad.addEventListener("pointerup", ()=>{ padActive=false; padVec={x:0,y:0}; stick.style.transform="translate(0,0)"; });
function padMove(e){ const r=pad.getBoundingClientRect(); let dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2);
  const m=Math.hypot(dx,dy), mx=r.width/2-8; if(m>mx){dx*=mx/m;dy*=mx/m;} padVec={x:dx/mx,y:dy/mx}; stick.style.transform=`translate(${dx}px,${dy}px)`; }
canvas.addEventListener("touchstart", e=>{ const t=e.changedTouches[0]; if(t.clientX>innerWidth*0.4){ look={id:t.identifier,x:t.clientX,y:t.clientY}; }}, {passive:true});
canvas.addEventListener("touchmove", e=>{ for(const t of e.changedTouches){ if(t.identifier===look.id){
  yaw -= (t.clientX-look.x)*0.005; pitch -= (t.clientY-look.y)*0.005; pitch=Math.max(-1.3,Math.min(1.3,pitch));
  look.x=t.clientX; look.y=t.clientY; applyLook(); } }}, {passive:true});
canvas.addEventListener("touchend", e=>{ for(const t of e.changedTouches) if(t.identifier===look.id) look.id=null; }, {passive:true});
$("#eBtn").addEventListener("pointerdown", e=>{ e.preventDefault(); tryEnter(); });

// ===== 门口检测 / 进门 =====
const promptEl=$("#prompt"), stubEl=$("#stub"), crossEl=$("#cross");
let atDoor=null, entering=false;
const fwd = new THREE.Vector3(), toDoor = new THREE.Vector3();
function updatePrompt(){
  if(entering){ promptEl.classList.remove("show"); return; }
  camera.getWorldDirection(fwd);
  let near=null, bestScore=0;
  for(const o of doorObjs){
    const dist = Math.hypot(camera.position.x-o.x, camera.position.z-o.z);
    if(dist>3.4) continue;
    toDoor.set(o.x-camera.position.x, 0, o.z-camera.position.z).normalize();
    const facing = fwd.x*toDoor.x + fwd.z*toDoor.z;      // 是否看向门
    if(facing>0.55){ const score=facing*(1-dist/3.4); if(score>bestScore){bestScore=score;near=o;} }
  }
  if(near!==atDoor){ atDoor=near;
    if(near){ promptEl.textContent = promptForDoor(near); promptEl.classList.add("show"); }
    else promptEl.classList.remove("show"); }
  else if(near && near.d.mirror){ promptEl.textContent = promptForDoor(near); }  // 镜子文案随进度刷新
}
function promptForDoor(o){
  if(o.d.mirror) return mirror.progress>=1 ? "按 E 穿过镜子" : `镜子太脏，看不清里面的人……还差 ${3-visited.size} 段记忆`;
  return o.d.prompt || ("按 E 进入 · "+o.d.name);
}
function tryEnter(){
  if(entering||!atDoor) return;
  if(atDoor.d.mirror && mirror.progress<1) return;   // 没集齐记忆，穿不过去
  entering=true; for(const k in keys)keys[k]=false;
  padVec={x:0,y:0}; promptEl.classList.remove("show");
  if(document.pointerLockElement) document.exitPointerLock();
  if(atDoor.d.mirror){ passThrough(); return; }                        // 穿过镜子 → 黑暗反转结局
  if(atDoor.d.origin){ $("#restart").classList.add("show"); return; }   // 觉醒室门 → 问是否重新开始
  const url = ROOM_URLS[atDoor.d.id];
  openDoorCinematic(atDoor, ()=>{
    if(url){ location.href = url; return; }                             // 有真房间 → 进房间
    // cold 暂占位：标记通关（等真房间做好换成各自页面）
    if(!CLEARED.has(atDoor.d.id)){ CLEARED.add(atDoor.d.id); saveCleared(); mirror.progress = CLEARED.size/3; }
    $("#stubText").textContent=atDoor.d.stub; stubEl.classList.add("show");
  });
}
// 穿过镜子：黑暗反转结局过场
function passThrough(){
  const E = document.querySelector("#ending"), show=id=>document.querySelector(id).classList.add("show"),
        hide=id=>document.querySelector(id).classList.remove("show");
  E.classList.add("show");
  setTimeout(()=>show("#eln1"),700);   setTimeout(()=>hide("#eln1"),3500);
  setTimeout(()=>show("#eln2"),3900);  setTimeout(()=>hide("#eln2"),7100);
  setTimeout(()=>show("#ewalk"),6700);
  setTimeout(()=>show("#eln3"),7700);  setTimeout(()=>hide("#eln3"),11200);
  setTimeout(()=>show("#eln4"),11600); setTimeout(()=>hide("#eln4"),15200);
  setTimeout(()=>show("#efin"),15900);
}
// ===== 开门过场(B:吱呀开门→光涌出→镜头推进→黑场) =====
let AC=null, cineFrom=null;
function creakSnd(){ try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(); o.type="sawtooth";
  o.frequency.setValueAtTime(150,AC.currentTime); o.frequency.linearRampToValueAtTime(65,AC.currentTime+1.5);
  const gn=AC.createGain(); gn.gain.setValueAtTime(0.0001,AC.currentTime);
  gn.gain.linearRampToValueAtTime(0.055,AC.currentTime+0.2); gn.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1.5);
  const f=AC.createBiquadFilter(); f.type="lowpass"; f.frequency.value=650;
  o.connect(f).connect(gn).connect(AC.destination); o.start(); o.stop(AC.currentTime+1.6); }catch(e){} }
function openDoorCinematic(o, after){
  creakSnd();
  cineFrom = { x:camera.position.x, z:camera.position.z, yaw, pitch, o };
  const t0 = performance.now();
  const tx = o.x - o.d.side*1.05, tz = o.z;
  const tyaw = o.d.side<0 ? Math.PI/2 : -Math.PI/2;
  const yaw0=yaw, pitch0=pitch, cx0=camera.position.x, cz0=camera.position.z;
  let fired=false;
  (function anim(){
    const t=(performance.now()-t0)/1000;
    const d1=Math.min(1,t/1.5), e1=d1<0.5?2*d1*d1:1-Math.pow(-2*d1+2,2)/2;
    o.hinge.rotation.y = -1.75*e1;
    o.pl.intensity = o.plBase + e1*3.0;
    if(t>0.75){ const wt=Math.min(1,(t-0.75)/1.4), e2=wt*wt*(3-2*wt);
      camera.position.x=cx0+(tx-cx0)*e2; camera.position.z=cz0+(tz-cz0)*e2;
      let dy=tyaw-yaw0; while(dy>Math.PI)dy-=Math.PI*2; while(dy<-Math.PI)dy+=Math.PI*2;
      yaw=yaw0+dy*e2; pitch=pitch0*(1-e2); applyLook(); }
    if(t>1.25) $("#blk").classList.add("show");
    if(t<2.35) requestAnimationFrame(anim);
    else if(!fired){ fired=true; after(); }
  })();
}
function cineRestore(){
  if(!cineFrom) return;
  camera.position.x=cineFrom.x; camera.position.z=cineFrom.z;
  yaw=cineFrom.yaw; pitch=cineFrom.pitch; applyLook();
  cineFrom.o.hinge.rotation.y=0; cineFrom.o.pl.intensity=cineFrom.o.plBase;
  $("#blk").classList.remove("show"); cineFrom=null;
}
$("#stubBack").addEventListener("click", ()=>{ stubEl.classList.remove("show"); cineRestore();
  setTimeout(()=>{ entering=false; atDoor=null; }, 300); });
// 重新开始确认
$("#rsYes").addEventListener("click", ()=>{ try{ localStorage.removeItem("mf3d_cleared"); }catch(e){} location.href="index.html?new=1"; });
$("#rsNo").addEventListener("click", ()=>{ $("#restart").classList.remove("show");
  setTimeout(()=>{ entering=false; atDoor=null; }, 300); });
$("#eRestart").addEventListener("click", ()=>{ try{ localStorage.removeItem("mf3d_cleared"); }catch(e){} location.href="index.html?new=1"; });

// ===== 循环 =====
const clock = new THREE.Clock();
const SPEED = 2.7, up = new THREE.Vector3(0,1,0);
const mv = new THREE.Vector3(), right = new THREE.Vector3();
let started = false, flickT = 0;

function frame(){
  requestAnimationFrame(frame);
  const dt = Math.min(0.05, clock.getDelta());
  if (started && !entering) {
    camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
    right.crossVectors(fwd, up).normalize();
    mv.set(0,0,0);
    if (keys["w"]||keys["arrowup"]) mv.add(fwd);      // W/↑ 前进
    if (keys["s"]||keys["arrowdown"]) mv.sub(fwd);    // S/↓ 后退
    if (keys["d"]||keys["arrowright"]) mv.add(right); // D/→ 右移
    if (keys["a"]||keys["arrowleft"]) mv.sub(right);  // A/← 左移；转头用鼠标
    if (padActive){ mv.addScaledVector(fwd, -padVec.y); mv.addScaledVector(right, padVec.x); }
    if (mv.lengthSq() > 0.0001) {
      mv.normalize().multiplyScalar(SPEED * dt); camera.position.add(mv);
      camera.position.x = Math.max(-HW+0.42, Math.min(HW-0.42, camera.position.x));
      camera.position.z = Math.max(Z1+0.6,   Math.min(Z0-0.4,  camera.position.z));
    }
  }
  camera.position.y = 1.62;
  // 手电筒跟随
  camera.getWorldDirection(fwd);
  flash.position.copy(camera.position);
  flash.target.position.copy(camera.position).add(fwd);
  // 吊灯闪
  flickT += dt;
  for (let i=0;i<lamps.length;i++){
    const f = 0.85 + Math.sin(flickT*6 + i*2.3)*0.06 + (Math.random()<0.025? -0.45:0);
    lamps[i].L.intensity = lamps[i].base * Math.max(0.2, f);
  }
  // 镜子：进度→清晰（脏雾渐退、镜中人渐显）
  mirror.clarity += (mirror.progress - mirror.clarity) * Math.min(1, dt*1.8);
  selfMat.opacity = 0.08 + 0.92*mirror.clarity;
  const cc = 0.5 + 0.5*mirror.clarity; selfMat.color.setRGB(cc*0.88, cc*0.95, cc);
  grimeMat.opacity = 0.62 - 0.5*mirror.clarity;   // murky 也留三成反射透出=像脏镜子
  mglow.intensity = 0.9 + 0.9*mirror.clarity;
  updatePrompt();
  composer.render();
}

// ===== 后期 =====
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.7, 0.5, 0.82);
composer.addPass(bloom);
composer.addPass(new OutputPass());

function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  bloom.setSize(innerWidth, innerHeight); }
addEventListener("resize", resize); resize();
frame();

// 载入完成 → 允许进入
manager.onLoad = () => { const b=$("#goBtn"); b.disabled=false; b.textContent="进 入 走 廊"; $("#gateHint").textContent="点击进入 · 桌面用鼠标转头，手机用摇杆"; };
$("#goBtn").addEventListener("click", () => {
  if ($("#goBtn").disabled) return;
  started = true; $("#gate").classList.add("gone"); crossEl.style.opacity="1";
  if (!("ontouchstart" in window)) canvas.requestPointerLock();
});
// 兜底：贴图若卡住，3.5s 后也放行
setTimeout(()=>{ const b=$("#goBtn"); if(b.disabled){ b.disabled=false; b.textContent="进 入 走 廊"; } }, 3500);

const QAP = new URLSearchParams(location.search);
if (QAP.get("qa")) { started = true; $("#gate").classList.add("gone");
  if(QAP.get("px")) camera.position.x = +QAP.get("px");
  if(QAP.get("pz")) camera.position.z = +QAP.get("pz");
  if(QAP.get("yaw")) yaw = +QAP.get("yaw");
  if(QAP.get("pitch")) pitch = +QAP.get("pitch");
  applyLook();
  if(QAP.get("open")){ setTimeout(()=>{ const o=doorObjs.find(x=>x.d.id===QAP.get("open"));
    if(o){ entering=true; openDoorCinematic(o, ()=>{}); } }, 400); } }
window.__fp = { scene, camera, renderer, composer, doorObjs, keys, frame, mirror, visited, passThrough,
  set yaw(v){ yaw=v; applyLook(); }, get yaw(){return yaw;},
  set pitch(v){ pitch=v; applyLook(); }, start(){ started=true; } };
</script>
</body>
</html>
