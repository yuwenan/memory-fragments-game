<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记忆碎片 · Memory Fragments</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- 1280×720 舞台，按窗口等比缩放，热点坐标稳定 -->
  <div id="stage">

    <!-- 房间 -->
    <div id="room" class="hidden">
      <div id="bgLayer"></div>          <!-- 背景图（带鼠标视差） -->
      <div id="lampGlow"></div>         <!-- 暖黄灯光辉光（闪烁） -->
      <div id="colorGrade"></div>       <!-- 暖色调色 -->
      <canvas id="fxCanvas"></canvas>   <!-- 灰尘粒子 -->
      <div id="grain"></div>            <!-- 胶片颗粒 -->
      <div id="vignette"></div>         <!-- 晕影 -->
      <div id="hotspots"></div>         <!-- 交互热点 -->

      <!-- HUD -->
      <div id="statusPlate">
        <div class="room-name">觉醒室</div>
        <div class="stat" id="clueStat">线索　0 / 4</div>
        <div class="stat" id="fragStat">碎片　0 / 5</div>
      </div>
      <div id="toast"></div>

      <!-- 静音开关 -->
      <button id="muteBtn" aria-label="声音开关" title="声音开关">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 9v6h4l5 4V5L8 9H4z"/><path class="wave" d="M16 9a4 4 0 0 1 0 6"/><path class="wave" d="M18.5 6.5a8 8 0 0 1 0 11"/>
        </svg>
      </button>
    </div>

    <!-- 自写确认弹窗 -->
    <div id="confirmBox" class="hidden">
      <div class="confirm-card">
        <p id="confirmText"></p>
        <div class="confirm-btns">
          <button id="confirmYes">确 定</button>
          <button id="confirmNo">取 消</button>
        </div>
      </div>
    </div>

    <!-- 记忆闪回 -->
    <div id="memFlash" class="hidden">
      <div class="mf-static"></div>
      <div class="mf-body">
        <div class="mf-kicker" id="mfKicker">记 忆 碎 片</div>
        <img id="mfImg" class="mf-img" alt="">
        <p class="mf-text" id="mfText"></p>
        <button id="mfClose" class="mf-continue">…</button>
      </div>
    </div>

    <!-- 记忆档案 -->
    <div id="memArchive" class="hidden">
      <div class="ma-panel">
        <button id="maClose" class="corner-close" aria-label="关闭">✕</button>
        <h2>记 忆 档 案</h2>
        <div id="maList"></div>
        <div class="ma-hint">每一块都是从你脑中被取走的——趁还记得，再读一遍。</div>
      </div>
    </div>

    <!-- 浮动热点名称标签 -->
    <div id="hoverLabel"></div>

    <!-- 标题封面（电影级） -->
    <div id="title">
      <div id="titleBg"></div>              <!-- 缓慢推近的走廊 -->
      <div id="titleLamp"></div>            <!-- 走廊吊灯明灭 -->
      <div class="title-fog fog1"></div>    <!-- 飘动雾气 -->
      <div class="title-fog fog2"></div>
      <canvas id="titleDust"></canvas>      <!-- 浮尘 -->
      <div id="titleGrain"></div>          <!-- 胶片颗粒 -->
      <div id="titleVig"></div>            <!-- 晕影呼吸 -->
      <div class="title-content">
        <h1>记 忆 碎 片</h1>
        <div class="subtitle">M E M O R Y　F R A G M E N T S</div>
        <p class="tagline">在一个废弃研究所醒来，你的记忆是唯一的钥匙。</p>
        <div class="title-buttons">
          <button id="continueBtn" class="title-btn hidden">继 续 游 戏</button>
          <button id="newBtn" class="title-btn">新 游 戏</button>
        </div>
      </div>
      <div class="version">v0.2 · Room 01 — 觉醒室</div>
    </div>

    <!-- 图片弹窗：只靠点击牌子外的空白处关闭 -->
    <div id="popup" class="hidden">
      <div class="popup-card">
        <h2 id="popupTitle"></h2>
        <div class="popup-img-wrap"><img id="popupImg" alt=""></div>
        <p id="popupDesc"></p>
      </div>
    </div>

    <!-- 线索图放大查看：点图放大，点一下/ESC 收回 -->
    <div id="imgZoom" class="hidden"><img id="imgZoomImg" alt=""></div>

    <!-- 密码键盘 -->
    <div id="keypad" class="hidden">
      <div class="keypad-panel">
        <button id="kpClose" class="corner-close" aria-label="关闭">✕</button>
        <div class="brand">SECURE-LOCK v7</div>
        <div class="digits" id="digits"></div>
        <div class="kp-hint" id="kpHint">输入四位密码</div>
        <div class="keys" id="keys"></div>
      </div>
    </div>

  </div>
</div>

<!-- 手机竖屏：请横屏提示 -->
<div id="rotateHint">
  <svg viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 19h2"/>
  </svg>
  <p>请把手机横过来<br>横屏体验</p>
</div>
<script src="game.js"></script>
</body>
</html>
