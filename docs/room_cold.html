<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记忆碎片 · 冷光的门后</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#cfdde8;}
  #c3d{position:fixed;inset:0;display:block;}
  #vig{position:fixed;inset:0;z-index:5;pointer-events:none;
    background:radial-gradient(ellipse 74% 68% at 50% 46%,transparent 46%,rgba(0,0,0,.58) 100%);}
  #grain{position:fixed;inset:-50%;z-index:6;pointer-events:none;opacity:.045;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain .5s steps(2) infinite;}
  @keyframes grain{0%{transform:translate(0,0)}50%{transform:translate(-6%,4%)}100%{transform:translate(4%,-5%)}}
  #cross{position:fixed;left:50%;top:50%;z-index:8;width:5px;height:5px;margin:-2.5px;border-radius:50%;
    background:rgba(210,230,245,.5);box-shadow:0 0 4px rgba(0,0,0,.8);pointer-events:none;opacity:0;transition:opacity .3s;}
  #tag{position:fixed;left:14px;top:12px;z-index:10;font-size:12px;letter-spacing:1px;color:#47555f;pointer-events:none;}
  #cap{position:fixed;left:0;right:0;top:10%;z-index:10;text-align:center;font-size:15px;letter-spacing:3px;
    color:#d4e2ec;text-shadow:0 0 14px rgba(0,0,0,.9),0 2px 8px #000;opacity:0;transition:opacity .7s;pointer-events:none;}
  #cap.show{opacity:1;}
  #prompt{position:fixed;left:50%;top:56%;z-index:9;transform:translateX(-50%);padding:8px 18px;
    border:1px solid rgba(150,190,220,.45);border-radius:24px;background:rgba(10,16,20,.84);font-size:15px;
    letter-spacing:2px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 24px rgba(120,180,230,.14);
    opacity:0;pointer-events:none;transition:opacity .2s;}
  #prompt.show{opacity:1;}
  #blk{position:fixed;inset:0;z-index:14;background:#000;opacity:0;pointer-events:none;transition:opacity .5s;}
  #blk.show{opacity:1;}
  #fadein{position:fixed;inset:0;z-index:13;background:#000;opacity:0;pointer-events:none;transition:opacity 1.6s;}
  #flash{position:fixed;inset:0;z-index:30;background:radial-gradient(ellipse at 50% 40%,#16202a,#05070a 75%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;text-align:center;padding:0 26px;
    opacity:0;pointer-events:none;transition:opacity 1.2s;}
  #flash.show{opacity:1;pointer-events:auto;}
  #flash .fk{font-size:14px;letter-spacing:6px;color:#6f8ba0;}
  #flash .ft{max-width:600px;font-size:19px;line-height:2.2;letter-spacing:2px;color:#d5e3ee;
    white-space:pre-line;min-height:9em;text-shadow:0 2px 10px #000;}
  #flash .fb{opacity:0;transition:opacity 1s;}
  #flash .fb.show{opacity:1;}
  .btn{padding:11px 30px;border:1px solid rgba(150,190,220,.5);border-radius:4px;background:rgba(14,24,32,.6);
    color:#cfe3f2;font-size:15px;letter-spacing:3px;cursor:pointer;}
  .btn:hover{background:rgba(26,44,58,.7);}
  #gate{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;background:#030507;text-align:center;transition:opacity .8s;}
  #gate.gone{opacity:0;pointer-events:none;}
  #gate .s{font-size:13px;letter-spacing:3px;color:#5a707f;}
  #gate .go{margin-top:4px;padding:12px 34px;border:1px solid rgba(150,190,220,.55);border-radius:4px;
    background:rgba(14,24,32,.5);color:#cfe3f2;font-size:15px;letter-spacing:4px;cursor:pointer;}
  #pad{position:fixed;left:26px;bottom:32px;z-index:11;width:128px;height:128px;border-radius:50%;
    border:1px solid rgba(150,190,220,.22);background:rgba(10,16,22,.32);touch-action:none;display:none;}
  #pad i{position:absolute;left:50%;top:50%;width:50px;height:50px;margin:-25px;border-radius:50%;
    background:rgba(150,190,220,.3);border:1px solid rgba(160,200,230,.5);}
  #eBtn{position:fixed;right:30px;bottom:60px;z-index:11;width:76px;height:76px;border-radius:50%;
    border:1px solid rgba(150,190,220,.4);background:rgba(14,24,32,.5);color:#cfe3f2;font-size:20px;
    display:none;align-items:center;justify-content:center;touch-action:none;}
  #answers{position:fixed;left:50%;bottom:8%;z-index:12;transform:translateX(-50%);
    display:none;flex-direction:column;gap:11px;width:min(540px,88vw);}
  #answers.show{display:flex;}
  #answers button{padding:13px 18px;border:1px solid rgba(200,220,210,.32);border-radius:3px;
    background:rgba(18,34,28,.85);color:#e2ecdf;font-size:16px;letter-spacing:3px;cursor:pointer;
    font-family:inherit;text-align:left;text-shadow:0 0 8px rgba(0,0,0,.6);
    box-shadow:0 4px 16px rgba(0,0,0,.5);transition:background .15s,transform .1s;}
  #answers button:hover{background:rgba(30,54,44,.92);transform:translateY(-1px);}
  #answers .n{display:inline-block;width:1.7em;color:#8fb0a0;}
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<div id="vig"></div><div id="grain"></div>
<div id="cross"></div>
<div id="tag">冷光的门后 · 教室</div>
<div id="cap"></div>
<div id="prompt"></div>
<div id="answers"></div>
<div id="blk"></div>
<div id="fadein"></div>
<div id="flash">
  <div class="fk">记 忆 碎 片</div>
  <p class="ft" id="flashText"></p>
  <button class="btn fb" id="flashBack">收 起 这 段 记 忆</button>
</div>
<div id="pad"><i></i></div>
<div id="eBtn">E</div>
<div id="gate">
  <div class="s">冷 光 的 门 后</div>
  <button class="go" id="goBtn" disabled>灯管还在嗡嗡响…</button>
  <div class="s" id="gateHint">晚自习，早就该结束了</div>
</div>

<script type="importmap">
{ "imports": { "three": "./assets/lib/three.module.js", "three/addons/": "./assets/lib/" }}
</script>
<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

const $ = s => document.querySelector(s);
const QA = new URLSearchParams(location.search);
const canvas = $("#c3d");
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.25));
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.35;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020304);
scene.fog = new THREE.FogExp2(0x070a0c, 0.035);
const camera = new THREE.PerspectiveCamera(68, innerWidth/innerHeight, 0.04, 60);
camera.position.set(0.75, 1.16, 1.5);   // 钉在你自己的座位(第3排第3列),面朝黑板
const solids = [];

// ===== 材质（复用 home 纹理，调冷色）=====
const maxAniso = renderer.capabilities.getMaxAnisotropy();
const manager = new THREE.LoadingManager();
const texL = new THREE.TextureLoader(manager);
function pbr(name, repX, repY, tint){
  const load = (suffix, srgb) => { const t = texL.load(`./assets/home/textures/${name}_${suffix}.jpg`);
    t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(repX, repY); t.anisotropy = maxAniso;
    if (srgb) t.colorSpace = THREE.SRGBColorSpace; return t; };
  const m = new THREE.MeshStandardMaterial({ map:load("color",true), normalMap:load("normal",false),
    roughnessMap:load("rough",false), roughness:1, metalness:0, color:tint, side:THREE.DoubleSide });
  m.normalScale.set(0.35,0.35); return m;
}
const wallMat  = pbr("wall", 5, 1.8, 0x9fa8a0);        // 灰白墙(泛旧)
const floorMat = pbr("floor", 5, 4, 0x8e9086);         // 灰绿旧木地板
const ceilMat  = pbr("wall", 4, 3, 0x6f766f);
const wainMat  = new THREE.MeshStandardMaterial({ color:0x274436, roughness:.72 });   // 绿墙裙
const woodDesk = new THREE.MeshStandardMaterial({ color:0x6d5638, roughness:.62 });
const woodDark = new THREE.MeshStandardMaterial({ color:0x3a2c1c, roughness:.68 });
const steelM   = new THREE.MeshStandardMaterial({ color:0x565c60, roughness:.42, metalness:.75 });

// ===== 房间壳 x[-4.2,4.2] z[-3.4,3.4] 高3.2；讲台/黑板在 -z，后门在 +z =====
function box(mat,w,h,d,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); scene.add(m); return m; }
function plane(mat,w,h,pos,rot){ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
  m.position.set(...pos); if(rot)m.rotation.set(...rot); scene.add(m); return m; }
plane(floorMat, 8.4, 6.8, [0,0,0], [-Math.PI/2,0,0]);
plane(ceilMat, 8.4, 6.8, [0,3.2,0], [Math.PI/2,0,0]);
box(wallMat, 8.4, 3.2, 0.1, 0, 1.6, -3.45);            // 前墙(黑板)
box(wallMat, 8.4, 3.2, 0.1, 0, 1.6, 3.45);             // 后墙(黑板报+后门)
box(wallMat, 0.1, 3.2, 6.8, -4.25, 1.6, 0);            // 西墙(窗)
box(wallMat, 0.1, 3.2, 6.8, 4.25, 1.6, 0);             // 东墙(走廊侧)
// 绿墙裙(中国老教室标配)+ 白粉笔槽踢脚
for(const [w,h,d,x,y,z] of [[8.36,1.05,0.05,0,0.525,-3.39],[8.36,1.05,0.05,0,0.525,3.39],
    [0.05,1.05,6.76,-4.19,0.525,0],[0.05,1.05,6.76,4.19,0.525,0]]) box(wainMat,w,h,d,x,y,z);

// ===== 黑板(前墙) + 自己写字的粉笔层 =====
box(woodDark, 3.9, 1.5, 0.05, 0, 1.55, -3.42);                       // 木框
const chalkCv = document.createElement("canvas"); chalkCv.width=768; chalkCv.height=288;
const chalkTex = new THREE.CanvasTexture(chalkCv);
const cx2d = chalkCv.getContext("2d");
function chalkBase(){
  cx2d.fillStyle="#15241c"; cx2d.fillRect(0,0,768,288);
  cx2d.strokeStyle="rgba(210,220,214,0.05)";                          // 没擦干净的旧粉笔痕
  for(let i=0;i<40;i++){ cx2d.lineWidth=Math.random()*10+4; cx2d.beginPath();
    const y=Math.random()*288; cx2d.moveTo(Math.random()*300,y); cx2d.lineTo(300+Math.random()*468,y+(Math.random()-0.5)*30); cx2d.stroke(); }
  chalkTex.needsUpdate=true;
}
chalkBase();
plane(new THREE.MeshStandardMaterial({ map:chalkTex, roughness:.92 }), 3.7, 1.32, [0,1.55,-3.39]);
box(wainMat, 3.9, 0.06, 0.12, 0, 0.76, -3.38);                        // 粉笔槽
// 槽里几截粉笔
for(const [px,len] of [[-1.2,0.06],[-0.4,0.045],[0.9,0.07]])
  box(new THREE.MeshStandardMaterial({color:0xe8e6da,roughness:.9}), len,0.014,0.014, px,0.80,-3.36);
const BOARD = new THREE.Vector3(0, 1.5, -3.4);
// 黑板上方标语牌(褪色红字)
{ const cv=document.createElement("canvas"); cv.width=512; cv.height=64; const x=cv.getContext("2d");
  x.fillStyle="#2a2622"; x.fillRect(0,0,512,64);
  x.font="bold 40px 'PingFang SC','Microsoft YaHei',sans-serif"; x.textAlign="center"; x.textBaseline="middle";
  x.fillStyle="rgba(150,60,50,0.55)"; x.fillText("好 好 学 习      天 天 向 上", 256, 34);
  const t=new THREE.CanvasTexture(cv); t.colorSpace=THREE.SRGBColorSpace;
  plane(new THREE.MeshStandardMaterial({map:t,roughness:.85}), 2.6, 0.32, [0,2.75,-3.39]); }

// ===== 讲台 + 教师桌 + 台灯(最后唯一的光) =====
box(woodDark, 3.0, 0.14, 1.15, 0, 0.07, -2.78);                       // 水泥讲台木包边
const tdesk = new THREE.Group(); tdesk.position.set(1.15, 0.14, -2.78); scene.add(tdesk);
{ const top=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.05,0.55), woodDesk); top.position.y=0.78; tdesk.add(top);
  const front=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.72,0.04), woodDesk); front.position.set(0,0.40,0.25); tdesk.add(front);
  for(const sx of [-0.47,0.47]){ const side=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.72,0.5), woodDesk);
    side.position.set(sx,0.40,0); tdesk.add(side); } }
solids.push({rect:true, x0:0.6, x1:1.7, z0:-3.1, z1:-2.45});
// 台灯(绿罩老式)
{ const base=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.09,0.02,12), steelM); base.position.set(1.5,0.97,-2.85); scene.add(base);
  const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,0.3,8), steelM); arm.position.set(1.5,1.12,-2.85); scene.add(arm);
  const shade=new THREE.Mesh(new THREE.SphereGeometry(0.09,12,8,0,Math.PI*2,0,1.4),
    new THREE.MeshStandardMaterial({color:0x1e4434,roughness:.4,emissive:0x0c2418,emissiveIntensity:1,side:THREE.DoubleSide}));
  shade.position.set(1.5,1.27,-2.85); scene.add(shade); }
const deskLamp = new THREE.PointLight(0xd7e6c8, 0.9, 5.5, 1.9); deskLamp.position.set(1.5,1.2,-2.85); scene.add(deskLamp);
// 点名册(教师桌上)
const roster = box(new THREE.MeshStandardMaterial({color:0x5a3026,roughness:.6}), 0.26,0.025,0.34, 1.05,0.82,-2.78);
roster.rotation.y=0.18;
const ROSTER = new THREE.Vector3(1.05, 0.9, -2.78);
// 讲台边掉着的戒尺(先藏着,人影消失后出现)
const ruler = box(woodDark, 0.5,0.012,0.035, -0.4,0.15,-2.5); ruler.rotation.y=0.5; ruler.visible=false;

// ===== 广播喇叭(前墙高处) =====
{ const spk=new THREE.Mesh(new THREE.BoxGeometry(0.42,0.3,0.2),
    new THREE.MeshStandardMaterial({color:0x6a6252,roughness:.8}));
  spk.position.set(3.5,2.8,-3.3); scene.add(spk);
  const grill=new THREE.Mesh(new THREE.PlaneGeometry(0.32,0.2),
    new THREE.MeshStandardMaterial({color:0x211d16,roughness:.9})); grill.position.set(3.5,2.8,-3.19); scene.add(grill); }

// ===== 课桌椅 4列×4排(第3排第3列是"你的") =====
const COLS=[-2.85,-1.35,0.75,2.25], ROWS=[-1.1,0.05,1.2,2.35];
const MY_C=2, MY_R=2;   // 你的课桌 (0.75, 1.2)
let myLid=null, myLidOpen=0;
function desk(x,z,mine){
  const g=new THREE.Group(); g.position.set(x,0,z); scene.add(g);
  const lid=new THREE.Mesh(new THREE.BoxGeometry(0.62,0.035,0.44), woodDesk);   // 掀盖桌面
  lid.position.set(0,0.72,0);
  const lidH=new THREE.Group(); lidH.position.set(0,0.72,-0.22); lid.position.set(0,0,0.22); lidH.add(lid); g.add(lidH);
  const tray=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.1,0.42),woodDark); tray.position.set(0,0.62,0); g.add(tray);
  for(const [lx,lz] of [[-0.27,-0.17],[0.27,-0.17],[-0.27,0.17],[0.27,0.17]]){
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.7,0.04), steelM); leg.position.set(lx,0.35,lz); g.add(leg); }
  // 椅子(桌后 +z)
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.03,0.36), woodDesk); seat.position.set(0,0.45,0.52); g.add(seat);
  const back=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.3,0.03), woodDesk); back.position.set(0,0.72,0.68); g.add(back);
  for(const [lx,lz] of [[-0.16,0.38],[0.16,0.38],[-0.16,0.66],[0.16,0.66]]){
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.035,0.45,0.035), steelM); leg.position.set(lx,0.225,lz); g.add(leg); }
  solids.push({rect:true, x0:x-0.36, x1:x+0.36, z0:z-0.28, z1:z+0.78});
  if(mine){ myLid=lidH;
    // 桌面刻字
    const cv=document.createElement("canvas"); cv.width=256; cv.height=128; const c2=cv.getContext("2d");
    c2.fillStyle="#6d5638"; c2.fillRect(0,0,256,128);
    c2.font="26px 'PingFang SC',sans-serif"; c2.fillStyle="rgba(30,20,10,0.85)";
    c2.save(); c2.translate(128,64); c2.rotate(-0.08); c2.fillText("我没有说谎",-70,8); c2.restore();
    const t=new THREE.CanvasTexture(cv); t.colorSpace=THREE.SRGBColorSpace;
    lid.material=new THREE.MeshStandardMaterial({map:t,roughness:.62});
  }
  return g;
}
for(let c=0;c<COLS.length;c++) for(let r=0;r<ROWS.length;r++) desk(COLS[c],ROWS[r], c===MY_C&&r===MY_R);
const MYDESK = new THREE.Vector3(COLS[MY_C], 0.75, ROWS[MY_R]);
// 课桌里的卷子(开盖后可见)
const paperCv=document.createElement("canvas"); paperCv.width=256; paperCv.height=192;
{ const c2=paperCv.getContext("2d"); c2.fillStyle="#cfc9b4"; c2.fillRect(0,0,256,192);
  c2.strokeStyle="rgba(60,60,70,0.5)"; for(let y=42;y<190;y+=18){ c2.beginPath(); c2.moveTo(14,y); c2.lineTo(242,y); c2.stroke(); }
  c2.font="bold 64px serif"; c2.fillStyle="rgba(170,30,20,0.9)"; c2.fillText("0", 190, 60);
  c2.font="20px 'PingFang SC',sans-serif"; c2.fillStyle="rgba(160,30,20,0.8)";
  c2.save(); c2.translate(60,120); c2.rotate(-0.06); c2.fillText("这么简单都不会",0,0); c2.restore(); }
const paperTex=new THREE.CanvasTexture(paperCv); paperTex.colorSpace=THREE.SRGBColorSpace;
const paper=new THREE.Mesh(new THREE.PlaneGeometry(0.3,0.22),
  new THREE.MeshStandardMaterial({map:paperTex,roughness:.9}));
paper.rotation.x=-Math.PI/2; paper.position.set(COLS[MY_C],0.685,ROWS[MY_R]); paper.visible=false; scene.add(paper);
const paperGlow=new THREE.PointLight(0xbfd8e8, 0, 1.6, 2); paperGlow.position.set(COLS[MY_C],0.9,ROWS[MY_R]); scene.add(paperGlow);

// ===== 西墙夜窗×3(月光+远处操场灯) =====
const nightCv=document.createElement("canvas"); nightCv.width=128; nightCv.height=128;
{ const x=nightCv.getContext("2d");
  const g=x.createLinearGradient(0,0,0,128); g.addColorStop(0,"#0a1524"); g.addColorStop(1,"#04070c");
  x.fillStyle=g; x.fillRect(0,0,128,128);
  x.fillStyle="rgba(200,215,235,0.75)"; x.beginPath(); x.arc(96,26,9,0,7); x.fill();       // 月亮
  x.fillStyle="rgba(200,215,235,0.12)"; x.beginPath(); x.arc(96,26,15,0,7); x.fill();
  x.fillStyle="rgba(255,220,140,0.25)"; x.fillRect(10,96,3,3); x.fillRect(30,102,3,3);     // 远处操场灯
}
const nightTex=new THREE.CanvasTexture(nightCv); nightTex.colorSpace=THREE.SRGBColorSpace;
const winFrameM=new THREE.MeshStandardMaterial({ color:0x3d4a44, roughness:.6 });
for(const wz of [-1.9,0,1.9]){
  const g=new THREE.Group(); g.position.set(-4.19,1.75,wz); g.rotation.y=Math.PI/2; scene.add(g);
  for(const [w,h,px,py] of [[1.5,0.06,0,0.66],[1.5,0.06,0,-0.66],[0.06,1.38,-0.75,0],[0.06,1.38,0.75,0],[0.05,1.3,0,0]]){
    const f=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.07),winFrameM); f.position.set(px,py,0); g.add(f); }
  const glass=new THREE.Mesh(new THREE.PlaneGeometry(1.44,1.26), new THREE.MeshBasicMaterial({ map:nightTex }));
  glass.position.z=-0.02; g.add(glass);
}
const moonLight=new THREE.PointLight(0x5a7290, 0.55, 9, 2); moonLight.position.set(-3.4,2.2,0); scene.add(moonLight);

// ===== 后墙:黑板报(褪色) + 后门(会自己合上) =====
{ const cv=document.createElement("canvas"); cv.width=512; cv.height=192; const x=cv.getContext("2d");
  x.fillStyle="#182420"; x.fillRect(0,0,512,192);
  x.font="bold 44px 'PingFang SC',sans-serif"; x.fillStyle="rgba(190,150,120,0.28)"; x.fillText("期 末 冲 刺", 40, 70);

// ===== 声音(全程序化) =====
let AC=null, buzzG=null, heartG=null, staticG=null;
function au(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function noiseSrc(dur){ const a=au(); if(!a) return null;
  const b=a.createBuffer(1,a.sampleRate*dur,a.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const s=a.createBufferSource(); s.buffer=b; return s; }
function startBuzz(){ const a=au(); if(!a||buzzG) return;               // 日光灯嗡嗡
  const o=a.createOscillator(); o.type="sawtooth"; o.frequency.value=100;
  const f=a.createBiquadFilter(); f.type="lowpass"; f.frequency.value=420;
  buzzG=a.createGain(); buzzG.gain.value=0.016;
  o.connect(f).connect(buzzG).connect(a.destination); o.start(); }
function bell(){ const a=au(); if(!a) return;                           // 走了调的电铃
  const o=a.createOscillator(); o.type="square"; o.frequency.setValueAtTime(485,a.currentTime);
  o.frequency.linearRampToValueAtTime(430,a.currentTime+2.4);
  const trem=a.createOscillator(); trem.frequency.value=16;
  const tg=a.createGain(); tg.gain.value=0.5; trem.connect(tg);
  const g=a.createGain(); g.gain.value=0.028; tg.connect(g.gain);
  const f=a.createBiquadFilter(); f.type="lowpass"; f.frequency.value=1400;
  o.connect(f).connect(g).connect(a.destination); o.start(); trem.start();
  g.gain.setValueAtTime(0.028,a.currentTime+1.9); g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+2.6);
  o.stop(a.currentTime+2.7); trem.stop(a.currentTime+2.7); }
function crackle(){ const a=au(); if(!a) return;                        // 广播喀啦
  const s=noiseSrc(0.5); const f=a.createBiquadFilter(); f.type="bandpass"; f.frequency.value=1900; f.Q.value=1.2;
  const g=a.createGain(); g.gain.setValueAtTime(0.12,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.45);
  s.connect(f).connect(g).connect(a.destination); s.start();
  const o=a.createOscillator(); o.type="sine"; o.frequency.value=880;   // 拿起话筒的迪——
  const g2=a.createGain(); g2.gain.setValueAtTime(0.0001,a.currentTime+0.5);
  g2.gain.linearRampToValueAtTime(0.045,a.currentTime+0.7); g2.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1.6);
  o.connect(g2).connect(a.destination); o.start(a.currentTime+0.5); o.stop(a.currentTime+1.7); }
function scratch(){ const a=au(); if(!a) return;                        // 粉笔写字
  const s=noiseSrc(0.22); const f=a.createBiquadFilter(); f.type="bandpass";
  f.frequency.value=3200+Math.random()*1200; f.Q.value=2.5;
  const g=a.createGain(); g.gain.setValueAtTime(0.09,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.2);
  s.connect(f).connect(g).connect(a.destination); s.start(); }
function sting(){ const a=au(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain(); o.type="sawtooth";
  o.frequency.setValueAtTime(700,a.currentTime); o.frequency.exponentialRampToValueAtTime(60,a.currentTime+0.8);
  g.gain.setValueAtTime(0.22,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.85);
  o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+0.9); }
function thud(){ const a=au(); if(!a) return; const s=noiseSrc(0.5);
  const f=a.createBiquadFilter(); f.type="lowpass"; f.frequency.value=90;
  const g=a.createGain(); g.gain.setValueAtTime(1.6,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.45);
  s.connect(f).connect(g).connect(a.destination); s.start(); }
function creak(dur=1.1, f0=180, f1=90){ const a=au(); if(!a) return;
  const o=a.createOscillator(); o.type="sawtooth";
  o.frequency.setValueAtTime(f0,a.currentTime); o.frequency.linearRampToValueAtTime(f1,a.currentTime+dur);
  const g=a.createGain(); g.gain.setValueAtTime(0.0001,a.currentTime);
  g.gain.linearRampToValueAtTime(0.05,a.currentTime+0.12);
  g.gain.setValueAtTime(0.045,a.currentTime+dur-0.25); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  const flt=a.createBiquadFilter(); flt.type="lowpass"; flt.frequency.value=800;
  o.connect(flt).connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+dur+0.05); }
function rulerClatter(){ const a=au(); if(!a) return;                   // 戒尺落地弹跳
  let t=a.currentTime;
  for(const [dt,vol] of [[0,0.5],[0.22,0.32],[0.38,0.2],[0.5,0.12],[0.58,0.07]]){
    const s=noiseSrc(0.08); const f=a.createBiquadFilter(); f.type="bandpass"; f.frequency.value=1400; f.Q.value=1.5;
    const g=a.createGain(); g.gain.setValueAtTime(vol,t+dt); g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.07);
    s.connect(f).connect(g).connect(a.destination); s.start(t+dt); } }
function setHeart(on){ const a=au(); if(!a) return;
  if(on && !heartG){ heartG={stop:false};
    const beat=()=>{ if(heartG.stop) return;
      for(const [dt,vol] of [[0,0.5],[0.16,0.3]]){
        const o=a.createOscillator(), g=a.createGain(); o.type="sine"; o.frequency.value=48;
        g.gain.setValueAtTime(0.0001,a.currentTime+dt); g.gain.linearRampToValueAtTime(vol,a.currentTime+dt+0.03);
        g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dt+0.22);
        o.connect(g).connect(a.destination); o.start(a.currentTime+dt); o.stop(a.currentTime+dt+0.3); }
      heartG.t=setTimeout(beat, 860); };
    beat(); }
  if(!on && heartG){ heartG.stop=true; clearTimeout(heartG.t); heartG=null; } }
let stepAcc=0;
function foot(){ const a=au(); if(!a) return; const s=noiseSrc(0.12);

$("#goBtn").addEventListener("click", ()=>{ if($("#goBtn").disabled)return;
  $("#gate").classList.add("gone");
  if(!("ontouchstart" in window) && !QA.get("qa")) canvas.requestPointerLock();
  beginRoom();
});
// 从走廊开门过场进来:黑场直接淡进教室
if(!QA.get("qa") && QA.get("from")==="corridor"){
  $("#gate").classList.add("gone");
  const fadeEl=$("#fadein"); fadeEl.style.opacity="1"; fadeEl.style.transition="none";
  beginRoom();
  setTimeout(()=>{ fadeEl.style.transition="opacity 1.8s"; fadeEl.style.opacity="0"; }, 350);
}
// 声音要用户手势:第一次点击/按键自动接上
{ const unlock=()=>{ const a=au(); if(a && a.state==="suspended") a.resume();
    startBuzz(); removeEventListener("pointerdown", unlock); removeEventListener("keydown", unlock); };
  addEventListener("pointerdown", unlock); addEventListener("keydown", unlock); }

// ===== QA 钩子 =====
if(QA.get("qa")){
  $("#gate").classList.add("gone"); started=true; frozen=false; startBuzz=()=>{}; bellDone=true;
  if(QA.get("yaw")) yaw=parseFloat(QA.get("yaw"));
  if(QA.get("pitch")) pitch=parseFloat(QA.get("pitch"));
  applyLook();
  doorT=1; doorClosed=true; backDoor.position.x=2.95;
  const q=parseInt(QA.get("q")||"-1");
  if(q>=0){ examStarted=true; deadRows=Math.min(q,3);
    for(let r=0;r<deadRows;r++) for(const t of tubes) if(t.row===[0,1,2][r]){ t.li.intensity=0; t.tube.material.color.setHex(0x11161b); }
    figWake(); figTarget=-2.6+q*0.9; figure.position.z=figTarget;
    ask(Math.min(q,QUESTIONS.length-1));
  } else setTimeout(startExam, 500);
}
window.__room={ scene, camera, renderer, figure, tubes, QUESTIONS,
  get qi(){return qi;}, ask, pick, figWake, startExam,
  get figZ(){return figure.position.z;}, get answersOpen(){return answersOpen;}, get deadRows(){return deadRows;},
  set yaw(v){yaw=v;applyLook();}, set pitch(v){pitch=v;applyLook();} };
</script>
</body>
</html>
