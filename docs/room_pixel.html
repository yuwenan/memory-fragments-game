<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>记忆碎片 · 幽蓝的门后</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#bfe3ff;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#04070c;}
  #c2d{image-rendering:pixelated;image-rendering:crisp-edges;background:#0a1420;
    box-shadow:0 0 110px rgba(40,110,200,.16);}
  #vig{position:fixed;inset:0;z-index:6;pointer-events:none;
    background:radial-gradient(ellipse 76% 70% at 50% 48%,transparent 48%,rgba(2,6,12,.66) 100%);}
  #tag{position:fixed;left:14px;top:12px;z-index:10;font-size:12px;letter-spacing:1px;color:#3f5b78;pointer-events:none;}
  #cap{position:fixed;left:0;right:0;top:9%;z-index:10;text-align:center;font-size:15px;letter-spacing:3px;
    color:#cfe6ff;text-shadow:0 0 12px rgba(80,170,255,.5),0 2px 8px #000;opacity:0;transition:opacity .6s;pointer-events:none;}
  #cap.show{opacity:1;}
  #prompt{position:fixed;left:50%;top:60%;z-index:9;transform:translateX(-50%);padding:8px 18px;
    border:1px solid rgba(90,170,255,.5);border-radius:24px;background:rgba(6,14,26,.85);font-size:15px;
    letter-spacing:2px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 24px rgba(70,160,255,.18);
    opacity:0;pointer-events:none;transition:opacity .2s;}
  #prompt.show{opacity:1;}
  #dlg{position:fixed;left:50%;bottom:9%;z-index:12;transform:translateX(-50%);width:min(560px,86vw);
    border:2px solid #3d7fbf;background:rgba(4,12,24,.94);padding:16px 20px 12px;
    box-shadow:0 0 0 2px #0a1a2e,0 8px 30px rgba(0,0,0,.7);display:none;}
  #dlg.show{display:block;}
  #dlg .who{font-size:12px;letter-spacing:3px;color:#5fd7e8;margin-bottom:8px;}
  #dlg .txt{font-size:16px;line-height:1.9;letter-spacing:1.5px;color:#d8ecff;min-height:3.6em;white-space:pre-line;}
  #dlg .nxt{text-align:right;font-size:12px;color:#4d7ba6;letter-spacing:2px;animation:blink 1.1s steps(2) infinite;}
  @keyframes blink{50%{opacity:.15;}}
  #dead{position:fixed;inset:0;z-index:25;display:none;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;background:#04080f;}
  #dead.show{display:flex;}
  #dead .noise{position:absolute;inset:0;opacity:.5;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:tv .12s steps(2) infinite;}
  @keyframes tv{0%{transform:translate(0,0)}50%{transform:translate(-4%,3%)}100%{transform:translate(3%,-4%)}}
  #dead .dt{position:relative;font-size:22px;letter-spacing:8px;color:#e8f4ff;text-shadow:0 0 18px rgba(120,200,255,.8);}
  #dead .ds{position:relative;font-size:12px;letter-spacing:4px;color:#5b83a8;}
  #flash{position:fixed;inset:0;z-index:30;background:radial-gradient(ellipse at 50% 40%,#0e2238,#02060c 75%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;text-align:center;padding:0 26px;
    opacity:0;pointer-events:none;transition:opacity 1.2s;}
  #flash.show{opacity:1;pointer-events:auto;}
  #flash .fk{font-size:14px;letter-spacing:6px;color:#4f8fc0;}
  #flash .ft{max-width:600px;font-size:19px;line-height:2.2;letter-spacing:2px;color:#cfe6ff;
    white-space:pre-line;min-height:10em;text-shadow:0 2px 10px #000;}
  #flash .fb{opacity:0;transition:opacity 1s;}
  #flash .fb.show{opacity:1;}
  .btn{padding:11px 30px;border:1px solid rgba(110,180,255,.5);border-radius:4px;background:rgba(10,24,42,.6);
    color:#bfe0ff;font-size:15px;letter-spacing:3px;cursor:pointer;}
  .btn:hover{background:rgba(20,44,74,.7);}
  #gate{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;background:#030609;text-align:center;transition:opacity .8s;}
  #gate.gone{opacity:0;pointer-events:none;}
  #gate .s{font-size:13px;letter-spacing:3px;color:#4a6b8c;}
  #gate .go{margin-top:4px;padding:12px 34px;border:1px solid rgba(110,180,255,.55);border-radius:4px;
    background:rgba(10,24,42,.5);color:#bfe0ff;font-size:15px;letter-spacing:4px;cursor:pointer;}
  #boot{position:fixed;inset:0;z-index:39;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;background:#04101f;text-align:center;}
  #boot.show{display:flex;}
  #boot .b1{font-size:15px;letter-spacing:6px;color:#7fc4ff;text-shadow:0 0 14px rgba(90,180,255,.7);}
  #boot .b2{font-size:20px;letter-spacing:5px;color:#e6f3ff;animation:blink 1s steps(2) infinite;}
  #boot .b3{font-size:12px;letter-spacing:3px;color:#3f6b94;}
  /* 触屏：左摇杆 + E */
  #pad{position:fixed;left:26px;bottom:32px;z-index:11;width:128px;height:128px;border-radius:50%;
    border:1px solid rgba(110,180,255,.25);background:rgba(8,18,32,.35);touch-action:none;display:none;}
  #pad i{position:absolute;left:50%;top:50%;width:50px;height:50px;margin:-25px;border-radius:50%;
    background:rgba(110,180,255,.3);border:1px solid rgba(130,190,255,.5);}
  #bE{position:fixed;right:28px;bottom:56px;z-index:11;width:72px;height:72px;border-radius:50%;display:none;
    align-items:center;justify-content:center;border:1px solid rgba(110,180,255,.4);background:rgba(8,20,36,.5);
    color:#bfe0ff;font-size:20px;touch-action:none;user-select:none;}
  @media (pointer:coarse){#pad{display:block;}#bE{display:flex;}}
</style>

<body>
<div id="wrap"><canvas id="c2d" width="384" height="216"></canvas></div>
<div id="vig"></div>
<div id="tag">幽蓝的门后 · 存档 7931</div>
<div id="cap"></div>
<div id="prompt"></div>
<div id="dlg"><div class="who">？？？</div><div class="txt"></div><div class="nxt">▼ 按 E 继续</div></div>
<div id="dead"><div class="noise"></div><div class="dt" id="deadT">信 号 丢 失</div><div class="ds">SIGNAL LOST · 正在读取存档 7931</div></div>
<div id="flash">
  <div class="fk">记 忆 碎 片</div>
  <p class="ft" id="flashText"></p>
  <button class="btn fb" id="flashBack">收 起 这 段 记 忆</button>
</div>
<div id="gate">
  <div class="s">幽 蓝 的 门 后</div>
  <button class="go" id="goBtn" disabled>载 入 中 …</button>
  <div class="s">门缝里的光一闪一闪，像老式屏幕</div>
</div>

<div id="pad"><i></i></div><div id="bE">E</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const cv = $("#c2d"), ctx = cv.getContext("2d");
ctx.imageSmoothingEnabled = false;
const W = 384, H = 216, TILE = 16;

function fit(){
  const s = Math.max(1, Math.floor(Math.min(innerWidth/W, innerHeight/H)));
  cv.style.width = W*s+"px"; cv.style.height = H*s+"px";
}
addEventListener("resize", fit); fit();

// ===== 素材（NinjaAdventure CC0） =====
const IMGS = {}, SRC = { nature:"nature.png", field:"field.png", water:"water.png", house:"house.png",
  boy:"boy_walk.png", cat:"cat.png", spirit:"spirit.png", fog:"fog.png" };
let loaded = 0, total = Object.keys(SRC).length;
for (const k in SRC){ const im = new Image(); im.src = "assets/pixelworld/"+SRC[k];
  im.onload = ()=>{ if(++loaded===total) assetsReady(); }; IMGS[k]=im; }

// 图集坐标 [sx,sy,sw,sh]
const NAT = {
  treeA:[0,0,32,32], treeB:[32,0,32,32], dead:[64,0,32,32], roots:[96,0,32,32],
  big3:[64,32,64,48], pink3:[192,32,64,48], bigPink:[0,272,50,64],
  stumpD:[0,112,32,32],
};
const TUFTS = [48,64,80,96,128,144].map(x=>[x,160,16,16]);
const BUSHES = [[0,160,16,16],[16,160,16,16],[32,160,16,16]];
const FLOWERS = [[0,176,16,16],[16,176,16,16],[32,176,16,16],[48,176,16,16],[96,176,16,16]];
// 深/浅绿取内部安全区（图集白底、圆角有黑白角标，避开）
const FLD = { darkIn:[[52,102],[58,106],[52,108],[62,100]], lightIn:[[52,54],[58,58],[54,62]] };
const WAT = { pond3:[0,96,48,48], puddle:[0,144,48,16] };
const HOUSE = [0,0,56,48];

// 把不透明白底图集裁块抠成透明（从边缘 BFS 吃掉近白/近底色像素）
function stripBG(img, sx,sy,sw,sh){
  const c=document.createElement("canvas"); c.width=sw; c.height=sh;
  const x=c.getContext("2d"); x.imageSmoothingEnabled=false;
  x.drawImage(img, sx,sy,sw,sh, 0,0,sw,sh);
  const id=x.getImageData(0,0,sw,sh), d=id.data;
  const bg=[d[0],d[1],d[2]];
  const near=(i)=>{ const dr=d[i]-bg[0],dg=d[i+1]-bg[1],db=d[i+2]-bg[2]; return dr*dr+dg*dg+db*db<3600; };
  const q=[]; const seen=new Uint8Array(sw*sh);
  for(let i=0;i<sw;i++){ q.push(i,(sh-1)*sw+i); }
  for(let j=0;j<sh;j++){ q.push(j*sw, j*sw+sw-1); }
  while(q.length){
    const p=q.pop(); if(seen[p]) continue; seen[p]=1;
    if(!near(p*4)) continue;
    d[p*4+3]=0;
    const px=p%sw, py=(p/sw)|0;
    if(px>0)q.push(p-1); if(px<sw-1)q.push(p+1); if(py>0)q.push(p-sw); if(py<sh-1)q.push(p+sw);
  }
  x.putImageData(id,0,0); return c;
}
let houseSpr=null, pondSpr=null, puddleSpr=null;

// ===== 世界 =====
const COLS=100, ROWS=64, WW=COLS*TILE, WH=ROWS*TILE;
const SPAWN = { x:800, y:940 };
const HOUSEPOS = { x:800, y:190 };          // 房子中心（sprite 底边对齐）
const GROVE = { x:1380, y:830, r:88 };      // 隐蔽林中空地
const GROVE_GAP = Math.PI;                  // 缺口朝西（对着小径来向）
const PONDS = [ {x:432,y:528}, {x:1152,y:312} ];  // pond3 stamp 左上角
const PUDDLES = [ [700,780],[860,640],[760,420],[1000,800],[560,880] ];
const PATH = [ [800,940],[770,800],[820,660],[760,520],[800,380],[800,258] ];
const PATH2 = [ [790,820],[980,800],[1160,812],[1292,830] ];

function hash(a,b){ let h=(a*374761393 + b*668265263)|0; h=(h^(h>>13))*1274126177; return ((h^(h>>16))>>>0)/4294967295; }
function segDist(px,py, ax,ay, bx,by){
  const dx=bx-ax, dy=by-ay, L2=dx*dx+dy*dy||1;
  let t=((px-ax)*dx+(py-ay)*dy)/L2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+dx*t), py-(ay+dy*t));
}
function nearPath(x,y,rad){
  for(const P of [PATH,PATH2]) for(let i=0;i<P.length-1;i++)
    if(segDist(x,y,P[i][0],P[i][1],P[i+1][0],P[i+1][1])<rad) return true;
  return false;
}
const pondRects = PONDS.map(p=>({x:p.x+5,y:p.y+6,w:38,h:36}));
function inClearing(x,y){
  if(Math.hypot(x-SPAWN.x,y-SPAWN.y)<46) return true;
  if(Math.hypot(x-GROVE.x,y-GROVE.y)<GROVE.r+34) return true;   // 空地+树环带自己摆
  if(x>HOUSEPOS.x-72&&x<HOUSEPOS.x+72&&y>HOUSEPOS.y-62&&y<HOUSEPOS.y+88) return true;
  for(const r of pondRects) if(x>r.x-20&&x<r.x+r.w+20&&y>r.y-18&&y<r.y+r.h+18) return true;
  return nearPath(x,y,24);
}

// 树（含碰撞）
const trees=[], solids=[];
function addTree(x,y,kind){
  const c=NAT[kind];
  trees.push({x,y,c,big:c[3]>40});
  solids.push({x, y:y-3, r:c[2]>40?9:6});
}
// 普通森林
for(let gy=2; gy<ROWS-2; gy+=2) for(let gx=2; gx<COLS-2; gx+=2){
  const h1=hash(gx,gy); if(h1<0.18) continue;                  // 密度
  const x=gx*TILE+8+(hash(gx,gy+99)-0.5)*14, y=gy*TILE+8+(hash(gx+7,gy)-0.5)*14;
  if(inClearing(x,y)) continue;
  const northBias=(1-y/WH)*0.35, r=hash(gx+31,gy+17);
  let kind = r<0.24+northBias ? "dead" : r<0.5 ? "treeA" : r<0.76 ? "treeB" : r<0.9 ? "roots" : "big3";
  addTree(x,y,kind);
}
// 世界边缘双圈密林
for(let gx=0; gx<COLS; gx++){ for(const gy of [0,1,ROWS-2,ROWS-1])
  addTree(gx*TILE+8+(hash(gx,gy)-0.5)*6, gy*TILE+12, hash(gx,gy*3)<0.3?"dead":(gx%2?"treeA":"treeB")); }
for(let gy=2; gy<ROWS-2; gy++){ for(const gx of [0,1,COLS-2,COLS-1])
  addTree(gx*TILE+8, gy*TILE+8+(hash(gx,gy)-0.5)*6, hash(gy,gx*3)<0.3?"dead":(gy%2?"treeB":"roots")); }
// 密林树环（留一个缺口=暗道）
const RING_N=17;
for(let i=0;i<RING_N;i++){
  const a=i/RING_N*Math.PI*2;
  let d=Math.atan2(Math.sin(a-GROVE_GAP),Math.cos(a-GROVE_GAP)); // 与缺口角距
  if(Math.abs(d)<0.34) continue;
  const rr=GROVE.r+16+(hash(i,5)-0.5)*8;
  addTree(GROVE.x+Math.cos(a)*rr, GROVE.y+Math.sin(a)*rr, hash(i,9)<0.5?"treeA":"treeB");
}
// 空地中央的大粉树（猫在树下）
trees.push({x:GROVE.x+6, y:GROVE.y-10, c:NAT.bigPink, big:true});
solids.push({x:GROVE.x+6, y:GROVE.y-14, r:8});
// 房子碰撞
solids.push({rect:true, x:HOUSEPOS.x-28, y:HOUSEPOS.y-20, w:56, h:40});
for(const r of pondRects) solids.push({rect:true, x:r.x, y:r.y, w:r.w, h:r.h});

// ===== 地面预渲染 =====
let ground=null;
function bakeGround(){
  houseSpr=stripBG(IMGS.house, ...HOUSE);
  pondSpr=stripBG(IMGS.water, ...WAT.pond3);
  puddleSpr=stripBG(IMGS.water, ...WAT.puddle);
  ground=document.createElement("canvas"); ground.width=WW; ground.height=WH;
  const g=ground.getContext("2d"); g.imageSmoothingEnabled=false;
  // 小径/空地 = 浅绿 tile 网格 + 抖动边缘
  const lightAt=(tx,ty)=>{
    const x=tx*16+8, y=ty*16+8;
    let d=1e9;
    for(const P of [PATH,PATH2]) for(let i=0;i<P.length-1;i++)
      d=Math.min(d, segDist(x,y,P[i][0],P[i][1],P[i+1][0],P[i+1][1]));
    d=Math.min(d, Math.hypot(x-SPAWN.x,y-SPAWN.y)-28);
    d=Math.min(d, Math.hypot(x-GROVE.x,y-GROVE.y)-(GROVE.r-38));
    d=Math.min(d, Math.hypot(x-HOUSEPOS.x,y-(HOUSEPOS.y+46))-26);
    if(d<18) return true;
    if(d<30) return hash(tx*3,ty*7)<0.45;
    return false;
  };
  for(let ty=0;ty<ROWS;ty++) for(let tx=0;tx<COLS;tx++){
    const set = lightAt(tx,ty) ? FLD.lightIn : FLD.darkIn;
    const v = set[(hash(tx,ty)*set.length)|0];
    g.drawImage(IMGS.field, v[0],v[1],16,16, tx*16,ty*16,16,16);
  }
  // 水（已抠底）
  for(const p of PONDS) g.drawImage(pondSpr, p.x,p.y);
  for(const [x,y] of PUDDLES) g.drawImage(puddleSpr, x,y);
  // 散布草叢/花（避开水面与房子）
  for(let i=0;i<780;i++){
    const x=(hash(i,1)*WW)|0, y=(hash(2,i)*WH)|0;
    if(x<40||x>WW-56||y<40||y>WH-56) continue;
    let onWater=false; for(const r of pondRects) if(x>r.x-8&&x<r.x+r.w+8&&y>r.y-8&&y<r.y+r.h+8) onWater=true;
    if(onWater||(x>HOUSEPOS.x-64&&x<HOUSEPOS.x+64&&y>HOUSEPOS.y-56&&y<HOUSEPOS.y+56)) continue;
    const r=hash(i,7);
    const c = r<0.62 ? TUFTS[(hash(i,3)*TUFTS.length)|0] : r<0.86 ? BUSHES[(hash(i,4)*3)|0] : FLOWERS[(hash(i,5)*5)|0];
    g.drawImage(IMGS.nature, c[0],c[1],16,16, x,y,16,16);
  }
  // 通往密林缺口的花小径（给眼尖的人）
  for(let i=0;i<7;i++){
    const t=i/6, x=1298+t*(GROVE.x-GROVE.r-4-1298), y=828+(hash(i,88)-0.5)*16;
    g.drawImage(IMGS.nature, ...FLOWERS[i%2], x, y+2, 16,16);
  }
}

// ===== 玩家 / 生物 =====
const player={ x:SPAWN.x, y:SPAWN.y, dir:0, moving:false, animT:0, dead:false }; // dir: 0下1上2左3右
const cat={ x:GROVE.x-16, y:GROVE.y+10 };
let spirit={ on:false, x:0, y:0, armed:true, alpha:0 };
let camX=0, camY=0, t=0, frozen=true;
let glitched=false, houseDark=false, npcTalked=false, dlgOpen=false, dlgIdx=0;
let frag={ on:false, x:GROVE.x-18, y:GROVE.y+28, got:false };
let groveCapShown=false, spiritCapShown=false;
const keys={};

const DLG_LINES = [
  "你回来啦。\n这次，外面又吵成什么样了？",
  "你每次躲进来，都在这棵树下坐着，\n一直坐到天黑，一句话也不说。",
  "这片林子里所有躲雨的地方都是你找到的。\n连做这个世界的人，都不知道这一条缝。",
  "……奇怪。\n我记得你的样子，记得清清楚楚。\n可你看我的眼神，越来越像在看一个陌生人。",
  "拿去吧。你埋在这儿的东西。\n趁你还记得，你埋过它。",
];
const MEMORY = "门外的争吵声隔着一层木板，压得很低，又很尖。\n你把音量调大，屏幕的蓝光照在脸上。\n下雨的森林、湖边、那棵会开花的树——\n在这里你走了一遍又一遍，谁也找不到你。\n\n碎片的背面，有一行像素小字：\n「样本 7931 · 避难所 · 已录入」。\n连你逃跑的地方，他们也要拿走。";

// ===== 声音（WebAudio 程序化，无音频文件） =====
let AC=null, rainGain=null;
function initAudio(){
  try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  const len=AC.sampleRate*2, buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf; src.loop=true;
  const bp=AC.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=1900; bp.Q.value=0.45;
  rainGain=AC.createGain(); rainGain.gain.value=0.045;
  src.connect(bp).connect(rainGain).connect(AC.destination); src.start();
  const lfo=AC.createOscillator(), lg=AC.createGain(); lfo.frequency.value=0.13; lg.gain.value=0.014;
  lfo.connect(lg).connect(rainGain.gain); lfo.start();
}
function thunder(){
  if(!AC) return;
  const len=AC.sampleRate*2.2, buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.4);
  const s=AC.createBufferSource(); s.buffer=buf;
  const lp=AC.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=140;
  const gn=AC.createGain(); gn.gain.value=0.9;
  s.connect(lp).connect(gn).connect(AC.destination); s.start();
}
function sting(){   // 幽灵出现/死亡刺音
  if(!AC) return;
  const o=AC.createOscillator(), gn=AC.createGain();
  o.type="sawtooth"; o.frequency.setValueAtTime(620,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(70,AC.currentTime+0.7);
  gn.gain.setValueAtTime(0.18,AC.currentTime); gn.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.75);
  o.connect(gn).connect(AC.destination); o.start(); o.stop(AC.currentTime+0.8);
}

// ===== 输入 =====
addEventListener("keydown", e=>{ const k=e.key.toLowerCase();
  if(["w","a","s","d","arrowup","arrowdown","arrowleft","arrowright"].includes(k)){ keys[k]=true; e.preventDefault(); }
  if(k==="e"||k==="enter") act(); });
addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);
let padActive=false, padVec={x:0,y:0};
const pad=$("#pad"), stick=pad.querySelector("i");
pad.addEventListener("pointerdown", e=>{padActive=true;padMove(e);pad.setPointerCapture(e.pointerId);});
pad.addEventListener("pointermove", e=>{if(padActive)padMove(e);});
pad.addEventListener("pointerup", ()=>{padActive=false;padVec={x:0,y:0};stick.style.transform="translate(0,0)";});
function padMove(e){ const r=pad.getBoundingClientRect(); let dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2);
  const m=Math.hypot(dx,dy),mx=r.width/2-8; if(m>mx){dx*=mx/m;dy*=mx/m;} padVec={x:dx/mx,y:dy/mx}; stick.style.transform=`translate(${dx}px,${dy}px)`; }
$("#bE").addEventListener("pointerdown", e=>{ e.preventDefault(); act(); });
$("#dlg").addEventListener("click", act);

let capTimer=null;
function caption(text, ms){
  const el=$("#cap"); el.textContent=text; el.classList.add("show");
  clearTimeout(capTimer); capTimer=setTimeout(()=>el.classList.remove("show"), ms||3400);
}

// ===== 交互 =====
function nearCat(){ return Math.hypot(player.x-cat.x, player.y-cat.y) < 22; }
function act(){
  if(frozen || player.dead || $("#flash").classList.contains("show")) return;
  if(dlgOpen){
    dlgIdx++;
    if(dlgIdx >= DLG_LINES.length){ dlgOpen=false; $("#dlg").classList.remove("show");
      npcTalked=true; frag.on=true; caption("它在花丛里刨了几下，刨出一样发光的东西", 3800); }
    else $("#dlg .txt").textContent = DLG_LINES[dlgIdx];
    return;
  }
  if(nearCat() && !npcTalked){
    dlgOpen=true; dlgIdx=0; $("#dlg .txt").textContent=DLG_LINES[0]; $("#dlg").classList.add("show");
    $("#prompt").classList.remove("show");
  }
}
function collectFrag(){
  frag.got=true; frag.on=false; frozen=true;
  const fEl=$("#flash"); fEl.classList.add("show");
  const ft=$("#flashText"); ft.textContent="";
  let i=0; const timer=setInterval(()=>{ i++; ft.textContent=MEMORY.slice(0,i);
    if(i>=MEMORY.length){ clearInterval(timer); setTimeout(()=>$("#flashBack").classList.add("show"),500); } }, 42);
}
$("#flashBack").addEventListener("click", ()=>{
  try{ const c=JSON.parse(localStorage.getItem("mf3d_cleared")||"[]");
    if(!c.includes("pixel")){ c.push("pixel"); localStorage.setItem("mf3d_cleared", JSON.stringify(c)); } }catch(e){}
  location.href="corridor3d.html";
});
function die(){
  if(player.dead) return; player.dead=true; sting();
  $("#dead").classList.add("show");
  setTimeout(()=>{
    player.x=SPAWN.x; player.y=SPAWN.y;
    spirit.on=false; spirit.armed=false; spirit.alpha=0;
    $("#dead").classList.remove("show"); player.dead=false;
    setTimeout(()=>{ spirit.armed=true; }, 2500);   // 重生保护
  }, 1500);
}
let staticBurst=0;
function glitchHome(){
  glitched=true; staticBurst=1; thunder();
  caption("存 档 损 坏 ：找 不 到 『 家 』", 3800);
  setTimeout(()=>{ houseDark=true; }, 900);
  setTimeout(()=>caption("雨里有什么东西醒了……去林子深处，找它记得的地方", 4600), 4200);
}

// ===== 物理 =====
const SPEED=74;
function blocked(nx,ny){
  if(nx<20||nx>WW-20||ny<24||ny>WH-16) return true;
  for(const s of solids){
    if(s.rect){ if(nx>s.x-4&&nx<s.x+s.w+4&&ny>s.y-2&&ny<s.y+s.h+4) return true; }
    else if(Math.hypot(nx-s.x,ny-s.y)<s.r+4) return true;
  }
  return false;
}
function inGrove(x,y){ return Math.hypot(x-GROVE.x,y-GROVE.y)<GROVE.r; }
function step(dt){
  if(frozen || player.dead || dlgOpen) return;
  let vx=(keys["d"]||keys["arrowright"]?1:0)-(keys["a"]||keys["arrowleft"]?1:0);
  let vy=(keys["s"]||keys["arrowdown"]?1:0)-(keys["w"]||keys["arrowup"]?1:0);
  if(padActive){ vx=padVec.x; vy=padVec.y; }
  const m=Math.hypot(vx,vy);
  player.moving = m>0.15;
  if(player.moving){
    vx/=m; vy/=m;
    player.dir = Math.abs(vx)>Math.abs(vy) ? (vx>0?3:2) : (vy>0?0:1);
    const nx=player.x+vx*SPEED*dt, ny=player.y+vy*SPEED*dt;
    if(!blocked(nx,player.y)) player.x=nx;
    if(!blocked(player.x,ny)) player.y=ny;
    player.animT+=dt;
  }
  // 房门触发
  if(!glitched && Math.abs(player.x-HOUSEPOS.x)<26 && player.y>HOUSEPOS.y+18 && player.y<HOUSEPOS.y+52) glitchHome();
  // 幽灵
  if(glitched && spirit.armed && !spirit.on && !inGrove(player.x,player.y)){
    spirit.on=true; spirit.armed=false; spirit.alpha=0;
    const a=Math.random()*Math.PI*2; spirit.x=player.x+Math.cos(a)*170; spirit.y=player.y+Math.sin(a)*170;
    if(!spiritCapShown){ spiritCapShown=true; caption("雨幕里，一团白色的东西朝你飘过来", 3400); sting(); }
  }
  if(spirit.on){
    spirit.alpha=Math.min(1,spirit.alpha+dt*0.8);
    let tx=player.x, ty=player.y;
    if(inGrove(player.x,player.y)){
      const a=Math.atan2(spirit.y-GROVE.y,spirit.x-GROVE.x);
      tx=GROVE.x+Math.cos(a)*(GROVE.r+30); ty=GROVE.y+Math.sin(a)*(GROVE.r+30);
      if(!groveCapShown){ groveCapShown=true; caption("它在林子外面打转……进不来这棵树的影子", 3800); }
    }
    const dx=tx-spirit.x, dy=ty-spirit.y, d=Math.hypot(dx,dy)||1, sp=56;
    spirit.x+=dx/d*sp*dt+(Math.random()-0.5)*1.2;
    spirit.y+=dy/d*sp*dt+(Math.random()-0.5)*1.2;
    if(inGrove(player.x,player.y)){
      const da=Math.atan2(spirit.y-GROVE.y,spirit.x-GROVE.x), dd=Math.hypot(spirit.x-GROVE.x,spirit.y-GROVE.y);
      if(dd<GROVE.r+18){ spirit.x=GROVE.x+Math.cos(da)*(GROVE.r+18); spirit.y=GROVE.y+Math.sin(da)*(GROVE.r+18); }
    }
    if(spirit.alpha>0.5 && Math.hypot(player.x-spirit.x, player.y-6-spirit.y)<10) return die();
  }
  if(frag.on && !frag.got && Math.hypot(player.x-frag.x,(player.y-6)-frag.y)<14) collectFrag();
  camX=Math.max(0,Math.min(WW-W, player.x-W/2));
  camY=Math.max(0,Math.min(WH-H, player.y-H/2-6));
}
function updatePrompt(){
  const el=$("#prompt");
  if(frozen||player.dead||dlgOpen||$("#flash").classList.contains("show")){ el.classList.remove("show"); return; }
  if(nearCat() && !npcTalked){ el.textContent="按 E 蹲下来"; el.classList.add("show"); }
  else el.classList.remove("show");
}

// ===== 雨 / 涟漪 / 雾 / 闪电 =====
const drops=[]; for(let i=0;i<110;i++) drops.push({x:Math.random()*(W+60)-30, y:Math.random()*H, s:230+Math.random()*130, l:5+Math.random()*6, a:0.16+Math.random()*0.3});
const ripples=[]; let rippleT=0, boltT=0, boltFlash=0;
function fx(dt){
  for(const d of drops){ d.x-=dt*d.s*0.18; d.y+=dt*d.s; if(d.y>H+8){ d.y=-10; d.x=Math.random()*(W+60)-20; } }
  rippleT-=dt;
  if(rippleT<=0){ rippleT=0.10;
    const pr=pondRects[(Math.random()*pondRects.length)|0];
    ripples.push({x:pr.x+Math.random()*pr.w, y:pr.y+Math.random()*pr.h, r:0.5, max:3.5+Math.random()*3});
    if(ripples.length>26) ripples.shift(); }
  for(const r of ripples) r.r+=dt*7;
  boltT-=dt;
  if(boltT<=0){ boltT=16+Math.random()*22; boltFlash=1; setTimeout(thunder, 300+Math.random()*700); }
  boltFlash=Math.max(0,boltFlash-dt*2.2);
}

// ===== 渲染 =====
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(-camX|0,-camY|0);
  ctx.drawImage(ground,0,0);
  // 涟漪
  ctx.lineWidth=1;
  for(const r of ripples){ if(r.r>=r.max) continue;
    ctx.strokeStyle=`rgba(225,242,255,${0.5*(1-r.r/r.max)})`;
    ctx.beginPath(); ctx.ellipse(r.x,r.y,r.r,r.r*0.55,0,0,Math.PI*2); ctx.stroke(); }

  // Y 排序绘制：树 / 房 / 猫 / 碎片 / 玩家 / 幽灵
  const ents=[];
  for(const tr of trees) ents.push({y:tr.y, draw(){ ctx.drawImage(IMGS.nature, tr.c[0],tr.c[1],tr.c[2],tr.c[3], (tr.x-tr.c[2]/2)|0, (tr.y-tr.c[3])|0, tr.c[2],tr.c[3]); }});
  ents.push({y:HOUSEPOS.y+24, draw(){
    const hx=(HOUSEPOS.x-28)|0, hy=(HOUSEPOS.y-24)|0;
    ctx.drawImage(houseSpr, hx,hy);
    if(!houseDark){ // 暖窗光（雨夜里唯一的暖色）
      const f=0.72+0.28*Math.sin(t*7.3)*Math.sin(t*2.1);
      ctx.fillStyle=`rgba(255,196,110,${0.75*f})`; ctx.fillRect(hx+6,hy+30,10,8); ctx.fillRect(hx+40,hy+30,9,8);
      const g=ctx.createRadialGradient(HOUSEPOS.x,hy+38,2, HOUSEPOS.x,hy+38,52);
      g.addColorStop(0,`rgba(255,190,100,${0.20*f})`); g.addColorStop(1,"rgba(255,190,100,0)");
      ctx.fillStyle=g; ctx.fillRect(hx-40,hy-10,140,100);
    }
    if(staticBurst>0){ // 崩坏雪花吃掉房子
      for(let i=0;i<160;i++){ ctx.fillStyle=Math.random()<0.6?`rgba(210,230,245,${Math.random()*0.9})`:"rgba(16,24,34,0.9)";
        ctx.fillRect(hx+Math.random()*56|0, hy+Math.random()*48|0, 2,1); } }
    if(houseDark){ ctx.fillStyle="rgba(8,14,22,0.55)"; ctx.fillRect(hx,hy,56,48);
      for(let i=0;i<20;i++){ ctx.fillStyle=`rgba(160,190,210,${Math.random()*0.2})`;
        ctx.fillRect(hx+Math.random()*56|0, hy+Math.random()*48|0, 1,1); } }
  }});
  ents.push({y:cat.y, draw(){
    const f=((t*1.6)|0)%2;
    ctx.drawImage(IMGS.cat, f*16,0,16,16, (cat.x-8)|0,(cat.y-14)|0,16,16);
  }});
  if(frag.on&&!frag.got) ents.push({y:frag.y+6, draw(){
    const fy=frag.y+Math.sin(t*3)*1.5;
    const g=ctx.createRadialGradient(frag.x,fy-3,0.5, frag.x,fy-3,10);
    g.addColorStop(0,"rgba(140,235,255,0.55)"); g.addColorStop(1,"rgba(140,235,255,0)");
    ctx.fillStyle=g; ctx.fillRect(frag.x-11,fy-14,22,22);
    ctx.fillStyle="#eafcff"; ctx.fillRect(frag.x-1,(fy-6)|0,3,6);
    ctx.fillStyle="#7defff"; ctx.fillRect(frag.x-3,(fy-4)|0,7,3);
  }});
  ents.push({y:player.y, draw(){
    ctx.fillStyle="rgba(0,0,0,0.28)"; ctx.beginPath();
    ctx.ellipse(player.x,player.y+1,5,2,0,0,Math.PI*2); ctx.fill();
    const fr = player.moving ? ((player.animT*7)|0)%4 : 0;
    ctx.drawImage(IMGS.boy, player.dir*16, fr*16, 16,16, (player.x-8)|0, (player.y-15)|0, 16,16);
  }});
  if(spirit.on) ents.push({y:spirit.y+8, draw(){
    const fl=0.55+0.45*Math.sin(t*9.7);
    ctx.globalAlpha=spirit.alpha*(0.5+0.4*fl);
    const fr=((t*5)|0)%4;
    ctx.drawImage(IMGS.spirit, fr*16,0,16,16, (spirit.x-8)|0,(spirit.y-12)|0,16,16);
    ctx.globalAlpha=spirit.alpha*0.25*fl;
    ctx.drawImage(IMGS.spirit, fr*16,0,16,16, (spirit.x-9)|0,(spirit.y-13)|0,18,18);
    ctx.globalAlpha=1;
  }});
  ents.sort((a,b)=>a.y-b.y);
  for(const e of ents) e.draw();
  ctx.restore();

  // 雨（屏幕空间，两层）
  ctx.strokeStyle="rgba(200,225,250,0.5)"; ctx.lineWidth=1;
  for(const d of drops){
    ctx.globalAlpha=d.a;
    ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-d.l*0.18,d.y+d.l); ctx.stroke();
  }
  ctx.globalAlpha=1;
  // 雾两层漂移
  const fw=320, fh=180;
  for(const [spd,alp,yy] of [[9,0.10,10],[-6,0.07,40]]){
    const off=((t*spd)%fw+fw)%fw;
    ctx.globalAlpha=alp;
    for(let x=-off; x<W; x+=fw) ctx.drawImage(IMGS.fog, x, yy, fw, fh);
  }
  ctx.globalAlpha=1;
  // 雨天调色（压蓝压暗，两道）+ 闪电
  ctx.globalCompositeOperation="multiply";
  ctx.fillStyle="rgb(132,150,192)"; ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgb(196,204,228)"; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation="source-over";
  if(boltFlash>0){ ctx.fillStyle=`rgba(235,242,255,${boltFlash*0.5})`; ctx.fillRect(0,0,W,H); }
  if(staticBurst>0) staticBurst=Math.max(0, staticBurst-0.02);
}

// ===== 主循环 =====
let last=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(0.033,(ts-last)/1000||0.016); last=ts; t+=dt;
  step(dt); fx(dt); draw(); updatePrompt();
}

function assetsReady(){
  bakeGround();
  const b=$("#goBtn"); b.disabled=false; b.textContent="推 门 进 去";
  requestAnimationFrame(frame);
}
$("#goBtn").addEventListener("click", ()=>{
  if($("#goBtn").disabled) return;
  $("#gate").classList.add("gone");
  const boot=$("#boot"); boot.classList.add("show");
  initAudio();
  const go=()=>{ boot.classList.remove("show"); frozen=false;
    caption("雨下大了……去找一个亮着灯的地方", 4600); };
  const tm=setTimeout(go, 2200);
  boot.addEventListener("click", ()=>{ clearTimeout(tm); go(); }, { once:true });
});
</script>
